type GridSize = 0.5 | 1 | 2.5 | 5;

interface ComponentDef {
  type: ComponentType;
  name: string;
  holeDiameter: number;
  frontDiameter: number;
  rearBodyW: number;
  rearBodyH: number;
  rearDepth: number;
  keepoutW: number;
  keepoutH: number;
  minSpacing: number;
  holeType?: 'circle' | 'slot';
  slotLength?: number;
  frontShape?: 'circle' | 'rect' | 'slot';
  frontW?: number;   // width of non-circular front-face geometry (faders/slots/rects)
  frontH?: number;   // height of non-circular front-face geometry (faders/slots/rects)
  nutDiameter?: number;
  washerDiameter?: number;
  knobDiameter?: number;
  knobEnabled?: boolean;
  manufacturer?: string;
  partNumber?: string;
  datasheetUrl?: string;
  category?: 'potentiometer' | 'jack' | 'switch' | 'led' | 'encoder' | 'fader' | 'custom';
  pinKeepoutW?: number;
  pinKeepoutH?: number;

  panelThicknessMax?: number;

interface PlacedComponent extends ComponentDef {

}

interface MountingHole {

  y: number;

  height: number;

interface PanelConfig {

interface CollisionWarning {

// ═══════════════════════════════════════════════════════════════════════════
// PURE HELPERS
// ═══════════════════════════════════════════════════════════════════════════

function panelWidthMM(panel: PanelConfig): number {
  return panel.widthHP * HP_TO_MM;
}

function snapToGrid(val: number, grid: GridSize): number {
  return Math.round(val / grid) * grid;
}

function defaultMountingHoles(widthMM: number): MountingHole[] {
  const xL = 7.5;
  const xR = widthMM - 7.5;
  const yT = 3.0;
  const yB = PANEL_HEIGHT_MM - 3.0;
  return [
    { id: 'mh-tl', x: xL, y: yT },
    { id: 'mh-tr', x: xR, y: yT },
    { id: 'mh-bl', x: xL, y: yB },
    { id: 'mh-br', x: xR, y: yB },
  ];
}

function aabbOverlap(
  ax: number, ay: number, aw: number, ah: number,
  bx: number, by: number, bw: number, bh: number
): boolean {
  return (
    ax - aw / 2 < bx + bw / 2 &&
    ax + aw / 2 > bx - bw / 2 &&
    ay - ah / 2 < by + bh / 2 &&
    ay + ah / 2 > by - bh / 2
  );
}

function circleOverlap(
  ax: number, ay: number, ar: number,
  bx: number, by: number, br: number
): number {
  const dist = Math.hypot(bx - ax, by - ay);
  return ar + br - dist;
}

function getFrontShape(c: ComponentDef): 'circle' | 'rect' | 'slot' {
  if (c.frontShape === 'rect' || c.frontShape === 'slot' || c.frontShape === 'circle') return c.frontShape;
  if (c.holeType === 'slot' || (c.frontW !== undefined && c.frontH !== undefined)) return 'slot';
  return 'circle';
}

function getFrontBounds(c: ComponentDef): { w: number; h: number } {
  const shape = getFrontShape(c);
  if (shape !== 'circle') {
    return {
      w: typeof c.frontW === 'number' ? c.frontW : c.frontDiameter,
      h: typeof c.frontH === 'number' ? c.frontH : c.frontDiameter,
    };
  }
  return { w: c.frontDiameter, h: c.frontDiameter };
}

function getFrontOBB(c: PlacedComponent): OBB {
  const b = getFrontBounds(c);
  return { cx: c.x, cy: c.y, hw: b.w / 2, hh: b.h / 2, angle: getFrontShape(c) === 'circle' ? 0 : c.rotation };
}

function getFrontExtents(c: PlacedComponent): { x1: number; x2: number; y1: number; y2: number } {
  return obbEdgeExtents(getFrontOBB(c));
}

function getFrontBottomOffset(c: ComponentDef): number {
  const b = getFrontBounds(c);
  const face = b.h / 2;
  const knob = c.knobEnabled && c.knobDiameter ? c.knobDiameter / 2 : 0;
  return Math.max(face, knob);
}

function frontClearance(a: PlacedComponent, b: PlacedComponent): number {
  if (getFrontShape(a) === 'circle' && getFrontShape(b) === 'circle') {
    return Math.hypot(b.x - a.x, b.y - a.y) - a.frontDiameter / 2 - b.frontDiameter / 2;
  }
  const ae = getFrontExtents(a);
  const be = getFrontExtents(b);
  const dx = Math.max(ae.x1 - be.x2, be.x1 - ae.x2, 0);
  const dy = Math.max(ae.y1 - be.y2, be.y1 - ae.y2, 0);
  if (dx === 0 && dy === 0) {
    const overlapX = Math.min(ae.x2, be.x2) - Math.max(ae.x1, be.x1);
    const overlapY = Math.min(ae.y2, be.y2) - Math.max(ae.y1, be.y1);
    return -Math.min(overlapX, overlapY);
  }
  return Math.hypot(dx, dy);
}

function computeWarnings(
  components: PlacedComponent[],
  widthMM: number,
  mountingHoles: MountingHoleConfig,
  pcb: PCBConfig
): CollisionWarning[] {
  const warnings: CollisionWarning[] = [];

  for (let i = 0; i < components.length; i++) {
    const a = components[i];
    const hr = a.holeDiameter / 2;

    if (a.x - hr < 0) warnings.push({ ids: [a.id], message: `"${a.label || a.name}" hole exceeds left panel edge`, severity: 'error' });
    if (a.x + hr > widthMM) warnings.push({ ids: [a.id], message: `"${a.label || a.name}" hole exceeds right panel edge`, severity: 'error' });
    if (a.y - hr < 0) warnings.push({ ids: [a.id], message: `"${a.label || a.name}" hole exceeds top panel edge`, severity: 'error' });
    if (a.y + hr > PANEL_HEIGHT_MM) warnings.push({ ids: [a.id], message: `"${a.label || a.name}" hole exceeds bottom panel edge`, severity: 'error' });

    // Front face edge check (rotation-aware for non-circular front shapes)
    const aName = a.label || a.name;
    const fe = getFrontExtents(a);
    if (fe.x1 < 0) warnings.push({ ids: [a.id], message: `"${aName}" front shape exceeds/violates left panel edge`, severity: 'warn' });
    if (fe.x2 > widthMM) warnings.push({ ids: [a.id], message: `"${aName}" front shape exceeds/violates right panel edge`, severity: 'warn' });
    if (fe.y1 < 0) warnings.push({ ids: [a.id], message: `"${aName}" front shape exceeds/violates top panel edge`, severity: 'warn' });
    if (fe.y2 > PANEL_HEIGHT_MM) warnings.push({ ids: [a.id], message: `"${aName}" front shape exceeds/violates bottom panel edge`, severity: 'warn' });

    // Rear body edge check (rotation-aware)
    if (a.rearBodyW > 0) {
      const be = obbEdgeExtents(makeBodyOBB(a));
      if (be.x1 < 0) warnings.push({ ids: [a.id], message: `"${aName}" rear body exceeds left panel edge`, severity: 'error' });
      if (be.x2 > widthMM) warnings.push({ ids: [a.id], message: `"${aName}" rear body exceeds right panel edge`, severity: 'error' });
      if (be.y1 < 0) warnings.push({ ids: [a.id], message: `"${aName}" rear body exceeds top panel edge`, severity: 'error' });
      if (be.y2 > PANEL_HEIGHT_MM) warnings.push({ ids: [a.id], message: `"${aName}" rear body exceeds bottom panel edge`, severity: 'error' });
    }

    // Rear keepout edge check (rotation-aware)
    if (a.keepoutW > 0) {
      const ke = obbEdgeExtents(makeKeepoutOBB(a));
      if (ke.x1 < 0) warnings.push({ ids: [a.id], message: `"${aName}" rear keepout exceeds left panel edge`, severity: 'warn' });
      if (ke.x2 > widthMM) warnings.push({ ids: [a.id], message: `"${aName}" rear keepout exceeds right panel edge`, severity: 'warn' });
      if (ke.y1 < 0) warnings.push({ ids: [a.id], message: `"${aName}" rear keepout exceeds top panel edge`, severity: 'warn' });
      if (ke.y2 > PANEL_HEIGHT_MM) warnings.push({ ids: [a.id], message: `"${aName}" rear keepout exceeds bottom panel edge`, severity: 'warn' });
    }

    if (mountingHoles.enabled) {
      for (const mh of mountingHoles.holes) {
        const dist = Math.hypot(a.x - mh.x, a.y - mh.y);
        const minDist = MOUNTING_HOLE_KEEPOUT_R_MM + a.holeDiameter / 2;
        if (dist < minDist) {
          warnings.push({ ids: [a.id], message: `"${a.label || a.name}" too close to mounting hole (${(minDist - dist).toFixed(1)}mm overlap)`, severity: 'error' });
        }
      }
    }

    for (let j = i + 1; j < components.length; j++) {
      const b = components[j];
      const nameA = `"${a.label || a.name}"`;
      const nameB = `"${b.label || b.name}"`;

      const koA = makeKeepoutOBB(a);
      const koB = makeKeepoutOBB(b);
      if (obbOverlap(koA, koB)) {
        const overlapX = (a.keepoutW / 2 + b.keepoutW / 2) - Math.abs(a.x - b.x);
        const overlapY = (a.keepoutH / 2 + b.keepoutH / 2) - Math.abs(a.y - b.y);
        const ovlp = Math.max(0, Math.min(overlapX, overlapY)).toFixed(1);
        warnings.push({ ids: [a.id, b.id], message: `${nameA} and ${nameB} rear keepout zones overlap by ~${ovlp}mm`, severity: 'error' });
      }

      if (a.rearBodyW > 0 && b.rearBodyW > 0) {
        const bdA = makeBodyOBB(a);
        const bdB = makeBodyOBB(b);
        if (obbOverlap(bdA, bdB)) {
          warnings.push({ ids: [a.id, b.id], message: `${nameA} and ${nameB} rear bodies overlap`, severity: 'error' });
        }
      }

      let edgeGap = frontClearance(a, b);
      if (getFrontShape(a) === 'circle' && getFrontShape(b) === 'circle') {
        const frontOverlap = -edgeGap;
        if (frontOverlap > 0) {
          warnings.push({ ids: [a.id, b.id], message: `${nameA} and ${nameB} front diameters overlap by ${frontOverlap.toFixed(1)}mm`, severity: 'error' });
        }
      } else if (obbOverlap(getFrontOBB(a), getFrontOBB(b))) {
        warnings.push({ ids: [a.id, b.id], message: `${nameA} and ${nameB} front shapes overlap`, severity: 'error' });
      }

      const minNeeded = Math.max(a.minSpacing, b.minSpacing);
      if (edgeGap >= 0 && edgeGap < minNeeded) {
        warnings.push({ ids: [a.id, b.id], message: `${nameA} and ${nameB} closer than recommended spacing (${edgeGap.toFixed(1)}mm gap, ${minNeeded}mm recommended)`, severity: 'warn' });
      }

      if (a.knobEnabled && b.knobEnabled && a.knobDiameter && b.knobDiameter) {
        const knobOvlp = circleOverlap(a.x, a.y, a.knobDiameter / 2, b.x, b.y, b.knobDiameter / 2);
        if (knobOvlp > 0) {
          warnings.push({ ids: [a.id, b.id], message: `${nameA} and ${nameB} knob diameters overlap by ${knobOvlp.toFixed(1)}mm`, severity: 'warn' });
        }
      }
    }
  }

  // PCB bounds check
  if (pcb.enabled) {
    for (const c of components) {
      const inBounds =
        c.x - c.rearBodyW / 2 >= pcb.x &&
        c.x + c.rearBodyW / 2 <= pcb.x + pcb.width &&
        c.y - c.rearBodyH / 2 >= pcb.y &&
        c.y + c.rearBodyH / 2 <= pcb.y + pcb.height;
      if (!inBounds && c.rearBodyW > 0) {
        warnings.push({ ids: [c.id], message: `"${c.label || c.name}" rear body is outside PCB bounds`, severity: 'warn' });
      }
      if (c.rearDepth > pcb.depthLimit) {
        warnings.push({ ids: [c.id], message: `"${c.label || c.name}" rear depth ${c.rearDepth}mm exceeds PCB depth limit ${pcb.depthLimit}mm`, severity: 'warn' });
      }
    }
  }

  return warnings;
}

function computeMaxDepth(components: PlacedComponent[]): number {
  return components.reduce((m, c) => Math.max(m, c.rearDepth), 0);
}

function distanceBetween(a: PlacedComponent, b: PlacedComponent): number {
  return Math.hypot(b.x - a.x, b.y - a.y);
}

function edgeClearance(a: PlacedComponent, b: PlacedComponent): number {
  return frontClearance(a, b);
}

interface OBB {
  cx: number; cy: number;
  hw: number; hh: number; // half-width, half-height
  angle: number;          // degrees
}

function degToRad(deg: number): number {
  return (deg * Math.PI) / 180;
}

function obbVertices(o: OBB): [number, number][] {
  const r = degToRad(o.angle);
  const cos = Math.cos(r), sin = Math.sin(r);
  return [
    [ o.hw,  o.hh],
    [-o.hw,  o.hh],
    [-o.hw, -o.hh],
    [ o.hw, -o.hh],
  ].map(([x, y]) => [
    o.cx + x * cos - y * sin,
    o.cy + x * sin + y * cos,
  ] as [number, number]);
}

function obbAxes(o: OBB): [number, number][] {
  const r = degToRad(o.angle);
  const cos = Math.cos(r), sin = Math.sin(r);
  return [[cos, sin], [-sin, cos]];
}

function projectOntoAxis(verts: [number, number][], axis: [number, number]): [number, number] {
  const dots = verts.map(([x, y]) => x * axis[0] + y * axis[1]);
  return [Math.min(...dots), Math.max(...dots)];
}

function obbOverlap(a: OBB, b: OBB): boolean {
  const va = obbVertices(a);
  const vb = obbVertices(b);
  for (const axis of [...obbAxes(a), ...obbAxes(b)]) {
    const [minA, maxA] = projectOntoAxis(va, axis);
    const [minB, maxB] = projectOntoAxis(vb, axis);
    if (maxA < minB || maxB < minA) return false;
  }
  return true;
}

function obbEdgeExtents(o: OBB): { x1: number; x2: number; y1: number; y2: number } {
  const r = degToRad(o.angle);
  const cos = Math.abs(Math.cos(r)), sin = Math.abs(Math.sin(r));
  const extX = o.hw * cos + o.hh * sin;
  const extY = o.hh * cos + o.hw * sin;
  return { x1: o.cx - extX, x2: o.cx + extX, y1: o.cy - extY, y2: o.cy + extY };
}

function makeBodyOBB(c: PlacedComponent): OBB {
  return { cx: c.x, cy: c.y, hw: c.rearBodyW / 2, hh: c.rearBodyH / 2, angle: c.rotation };
}

function makeKeepoutOBB(c: PlacedComponent): OBB {
  return { cx: c.x, cy: c.y, hw: c.keepoutW / 2, hh: c.keepoutH / 2, angle: c.rotation };
}

// ═══════════════════════════════════════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════════════════════════════════════

type AppAction =
  | { type: 'SET_PANEL_HP'; hp: number }
  | { type: 'ADD_COMPONENT'; def: ComponentDef; x: number; y: number }
  | { type: 'UPDATE_COMPONENT'; id: string; patch: Partial<PlacedComponent> }
  | { type: 'DELETE_SELECTED' }
  | { type: 'DELETE_COMPONENT'; id: string }
  | { type: 'CLEAR_PANEL' }
  | { type: 'START_NEW_PROJECT' }
  | { type: 'DUPLICATE_SELECTED' }
  | { type: 'DUPLICATE_COMPONENT'; id: string }
  | { type: 'SELECT'; ids: string[]; additive: boolean }
  | { type: 'DESELECT_ALL' }
  | { type: 'MOVE_COMPONENT'; id: string; x: number; y: number }
  | { type: 'MOVE_COMPONENTS'; moves: { id: string; x: number; y: number }[] }
  | { type: 'SET_VIEW_MODE'; mode: ViewMode }
  | { type: 'SET_GRID_SIZE'; size: GridSize }
  | { type: 'TOGGLE_MAJOR_GRID' }
  | { type: 'SET_PCB'; patch: Partial<PCBConfig> }
  | { type: 'SET_MOUNTING_HOLES'; patch: Partial<MountingHoleConfig> }
  | { type: 'UPDATE_MOUNTING_HOLE'; id: string; x: number; y: number }
  | { type: 'ALIGN'; axis: 'left'|'right'|'top'|'bottom'|'centerH'|'centerV' }
  | { type: 'DISTRIBUTE'; axis: 'h'|'v' }
  | { type: 'LOAD_PRESET'; components: PlacedComponent[] }
  | { type: 'LOAD_STATE'; state: Omit<AppState,'history'|'future'> }
  | { type: 'UNDO' }
  | { type: 'REDO' }
  | { type: 'ADD_ARTWORK'; item: ArtworkItem }
  | { type: 'UPDATE_ARTWORK'; id: string; patch: Partial<ArtworkItem> }
  | { type: 'DELETE_ARTWORK'; id: string }
  | { type: 'MOVE_ARTWORK'; id: string; x: number; y: number }
  | { type: 'SELECT_ARTWORK'; id: string | null }
  | { type: 'SET_CLIP_ARTWORK'; value: boolean }
  | { type: 'SET_IGNORE_LOCKED_CLICKS'; value: boolean }
  | { type: 'SET_SHOW_ARTWORK_IN_DRILL'; value: boolean }
  | { type: 'SET_DRILL_ARTWORK_OPACITY'; value: number }
  | { type: 'SET_ALL_ARTWORK_VISIBLE'; visible: boolean }
  | { type: 'REORDER_ARTWORK'; id: string; dir: 'forward' | 'backward' | 'front' | 'back' }
  | { type: 'ADD_TEXT'; item: TextItem }
  | { type: 'UPDATE_TEXT'; id: string; patch: Partial<TextItem> }
  | { type: 'DELETE_TEXT'; id: string }
  | { type: 'MOVE_TEXT'; id: string; x: number; y: number }
  | { type: 'SELECT_TEXT'; id: string | null }
  | { type: 'ADD_SCALE'; item: ScaleItem }
  | { type: 'DELETE_SCALE'; id: string }
  | { type: 'ADD_CUSTOM_PART'; item: ComponentDef }
  | { type: 'DELETE_CUSTOM_PART'; name: string }
  | { type: 'IMPORT_CUSTOM_PARTS'; items: ComponentDef[] }
  | { type: 'RESET_CUSTOM_PARTS' }
  | { type: 'SET_LAYER_VISIBILITY'; key: keyof LayerVisibility; value: boolean }
  | { type: 'SET_DEPTH_SETTINGS'; patch: Partial<DepthSettings> };

// ═══════════════════════════════════════════════════════════════════════════
// INITIAL STATE
// ═══════════════════════════════════════════════════════════════════════════

function makeInitialState(): AppState {
  const panel: PanelConfig = { widthHP: 8, customHP: false };
  const widthMM = panelWidthMM(panel);
  return {
    panel,
    components: [],
    artworks: [],
    textItems: [],
    scaleItems: [],
    customParts: [],
    selected: [],
    selectedArtwork: null,
    selectedText: null,
    viewMode: 'front',
    grid: { size: 1, showMajor: true },
    pcb: { enabled: false, x: 0, y: 9, width: widthMM, height: 110, depthLimit: 50 },
    mountingHoles: { enabled: true, holes: defaultMountingHoles(widthMM) },
    clipArtworkToPanel: true,
    ignoreLockedArtworkClicks: false,
    showArtworkInDrillView: false,
    drillArtworkOpacity: 0.3,
    layerVisibility: defaultLayerVisibility(),
    depthSettings: { caseDepthLimitMm: 45, pcbDistanceBehindPanelMm: 12, showPCBPlane: true },
    history: [],
    future: [],
  };
}

// ═══════════════════════════════════════════════════════════════════════════
// REDUCER
// ═══════════════════════════════════════════════════════════════════════════

function snapshot(s: AppState): Omit<AppState,'history'|'future'> {
  const { history: _h, future: _f, ...rest } = s;
  return rest;
}

function withHistory(prev: AppState, next: Omit<AppState,'history'|'future'>): AppState {
  const history = [...prev.history.slice(-MAX_UNDO + 1), snapshot(prev)];
  return { ...next, history, future: [] };
}

function appReducer(state: AppState, action: AppAction): AppState {
  switch (action.type) {

    case 'SET_PANEL_HP': {
      const panel = { ...state.panel, widthHP: action.hp };
      const widthMM = panelWidthMM(panel);
      return withHistory(state, {
        ...snapshot(state),
        panel,
        mountingHoles: { ...state.mountingHoles, holes: defaultMountingHoles(widthMM) },
        // Keep the rear PCB outline matched to the current panel width when HP changes.
        // Preserve the user's PCB Y/height/depth settings.
        pcb: { ...state.pcb, x: 0, width: widthMM },
      });
    }

    case 'ADD_COMPONENT': {
      const comp: PlacedComponent = {
        ...action.def,
        id: crypto.randomUUID(),
        label: action.def.name,
        x: action.x,
        y: action.y,
        rotation: 0,
        notes: '',
      };
      return withHistory(state, {
        ...snapshot(state),
        components: [...state.components, comp],
        selected: [comp.id],
      });
    }

    case 'UPDATE_COMPONENT': {
      return withHistory(state, {
        ...snapshot(state),
        components: state.components.map(c =>
          c.id === action.id ? { ...c, ...action.patch } : c
        ),
      });
    }

    case 'DELETE_SELECTED': {
      return withHistory(state, {
        ...snapshot(state),
        components: state.components.filter(c => !state.selected.includes(c.id)),
        selected: [],
      });
    }

    case 'DELETE_COMPONENT': {
      return withHistory(state, {
        ...snapshot(state),
        components: state.components.filter(c => c.id !== action.id),
        selected: state.selected.filter(id => id !== action.id),
        selectedArtwork: null,
        selectedText: null,
      });
    }

    case 'CLEAR_PANEL': {
      if (state.components.length === 0) return state;
      return withHistory(state, {
        ...snapshot(state),
        components: [],
        selected: [],
        selectedArtwork: null,
        selectedText: null,
      });
    }

    case 'START_NEW_PROJECT': {
      const fresh = snapshot(makeInitialState());
      return withHistory(state, {
        ...fresh,
        // Custom parts are treated like the user's reusable library, so keep them.
        customParts: state.customParts,
      });
    }

    case 'DUPLICATE_SELECTED': {
      const dupes = state.components
        .filter(c => state.selected.includes(c.id))
        .map(c => ({ ...c, id: crypto.randomUUID(), x: c.x + 5, y: c.y + 5 }));
      return withHistory(state, {
        ...snapshot(state),
        components: [...state.components, ...dupes],
        selected: dupes.map(d => d.id),
      });
    }

    case 'DUPLICATE_COMPONENT': {
      const src = state.components.find(c => c.id === action.id);
      if (!src) return state;
      const dupe: PlacedComponent = { ...src, id: crypto.randomUUID(), x: src.x + 5, y: src.y + 5 };
      return withHistory(state, {
        ...snapshot(state),
        components: [...state.components, dupe],
        selected: [dupe.id],
        selectedArtwork: null,
        selectedText: null,
      });
    }

    case 'SELECT': {
      const ids = action.additive
        ? [...new Set([...state.selected, ...action.ids])]
        : action.ids;
      return { ...state, selected: ids, selectedArtwork: null, selectedText: null };
    }

    case 'DESELECT_ALL':
      return { ...state, selected: [], selectedArtwork: null, selectedText: null };

    case 'MOVE_COMPONENT': {
      return withHistory(state, {
        ...snapshot(state),
        components: state.components.map(c =>
          c.id === action.id ? { ...c, x: action.x, y: action.y } : c
        ),
      });
    }

    case 'MOVE_COMPONENTS': {
      const movesMap = new Map(action.moves.map(m => [m.id, m]));
      return withHistory(state, {
        ...snapshot(state),
        components: state.components.map(c =>
          movesMap.has(c.id) ? { ...c, x: movesMap.get(c.id)!.x, y: movesMap.get(c.id)!.y } : c
        ),
      });
    }

    case 'SET_VIEW_MODE':
      return { ...state, viewMode: action.mode };

    case 'SET_GRID_SIZE':
      return { ...state, grid: { ...state.grid, size: action.size } };

    case 'TOGGLE_MAJOR_GRID':
      return { ...state, grid: { ...state.grid, showMajor: !state.grid.showMajor } };

    case 'SET_PCB':
      return withHistory(state, { ...snapshot(state), pcb: { ...state.pcb, ...action.patch } });

    case 'SET_MOUNTING_HOLES':
      return withHistory(state, { ...snapshot(state), mountingHoles: { ...state.mountingHoles, ...action.patch } });

    case 'UPDATE_MOUNTING_HOLE':
      return withHistory(state, {
        ...snapshot(state),
        mountingHoles: {
          ...state.mountingHoles,
          holes: state.mountingHoles.holes.map(h =>
            h.id === action.id ? { ...h, x: action.x, y: action.y } : h
          ),
        },
      });

    case 'ALIGN': {
      if (state.selected.length < 2) return state;
      const sel = state.components.filter(c => state.selected.includes(c.id));
      const extents = new Map(sel.map(c => [c.id, getFrontExtents(c)]));
      const left   = Math.min(...sel.map(c => extents.get(c.id)!.x1));
      const right  = Math.max(...sel.map(c => extents.get(c.id)!.x2));
      const top    = Math.min(...sel.map(c => extents.get(c.id)!.y1));
      const bottom = Math.max(...sel.map(c => extents.get(c.id)!.y2));
      const centerX = sel.reduce((sum, c) => sum + c.x, 0) / sel.length;
      const centerY = sel.reduce((sum, c) => sum + c.y, 0) / sel.length;
      const getX = (c: PlacedComponent) => {
        const e = extents.get(c.id)!;
        if (action.axis === 'left')    return left  + (c.x - e.x1);
        if (action.axis === 'right')   return right - (e.x2 - c.x);
        if (action.axis === 'centerV') return centerX;
        return c.x;
      };
      const getY = (c: PlacedComponent) => {
        const e = extents.get(c.id)!;
        if (action.axis === 'top')     return top    + (c.y - e.y1);
        if (action.axis === 'bottom')  return bottom - (e.y2 - c.y);
        if (action.axis === 'centerH') return centerY;
        return c.y;
      };
      return withHistory(state, {
        ...snapshot(state),
        components: state.components.map(c =>
          state.selected.includes(c.id) ? { ...c, x: getX(c), y: getY(c) } : c
        ),
      });
    }

    case 'DISTRIBUTE': {
      if (state.selected.length < 3) return state;
      const sel = [...state.components.filter(c => state.selected.includes(c.id))];
      if (action.axis === 'h') {
        sel.sort((a, b) => a.x - b.x);
        const minX = sel[0].x, maxX = sel[sel.length-1].x;
        const step = (maxX - minX) / (sel.length - 1);
        const xMap = new Map(sel.map((c, i) => [c.id, minX + i * step]));
        return withHistory(state, {
          ...snapshot(state),
          components: state.components.map(c => xMap.has(c.id) ? { ...c, x: xMap.get(c.id)! } : c),
        });
      } else {
        sel.sort((a, b) => a.y - b.y);
        const minY = sel[0].y, maxY = sel[sel.length-1].y;
        const step = (maxY - minY) / (sel.length - 1);
        const yMap = new Map(sel.map((c, i) => [c.id, minY + i * step]));
        return withHistory(state, {
          ...snapshot(state),
          components: state.components.map(c => yMap.has(c.id) ? { ...c, y: yMap.get(c.id)! } : c),
        });
      }
    }

    case 'LOAD_PRESET':
      return withHistory(state, { ...snapshot(state), components: action.components, selected: [] });

    case 'LOAD_STATE':
      return { ...action.state, history: [], future: [] };

    case 'UNDO': {
      if (state.history.length === 0) return state;
      const prev = state.history[state.history.length - 1];
      const history = state.history.slice(0, -1);
      const future = [snapshot(state), ...state.future];
      return { ...prev, history, future };
    }

    case 'REDO': {
      if (state.future.length === 0) return state;
      const next = state.future[0];
      const future = state.future.slice(1);
      const history = [...state.history, snapshot(state)];
      return { ...next, history, future };
    }

    case 'ADD_ARTWORK':
      return withHistory(state, {
        ...snapshot(state),
        artworks: [...state.artworks, action.item],
        selected: [],
        selectedArtwork: action.item.id,
      });

    case 'UPDATE_ARTWORK':
      return withHistory(state, {
        ...snapshot(state),
        artworks: state.artworks.map(a =>
          a.id === action.id ? { ...a, ...action.patch } : a
        ),
      });

    case 'DELETE_ARTWORK':
      return withHistory(state, {
        ...snapshot(state),
        artworks: state.artworks.filter(a => a.id !== action.id),
        selectedArtwork: state.selectedArtwork === action.id ? null : state.selectedArtwork,
      });

    case 'MOVE_ARTWORK':
      return withHistory(state, {
        ...snapshot(state),
        artworks: state.artworks.map(a =>
          a.id === action.id ? { ...a, x: action.x, y: action.y } : a
        ),
      });

    case 'SELECT_ARTWORK':
      return { ...state, selectedArtwork: action.id, selectedText: null, selected: action.id !== null ? [] : state.selected };

    case 'SET_CLIP_ARTWORK':
      return { ...state, clipArtworkToPanel: action.value };

    case 'SET_IGNORE_LOCKED_CLICKS':
      return { ...state, ignoreLockedArtworkClicks: action.value };

    case 'SET_SHOW_ARTWORK_IN_DRILL':
      return { ...state, showArtworkInDrillView: action.value };

    case 'SET_DRILL_ARTWORK_OPACITY':
      return { ...state, drillArtworkOpacity: action.value };

    case 'SET_ALL_ARTWORK_VISIBLE':
      return withHistory(state, {
        ...snapshot(state),
        artworks: state.artworks.map(a => ({ ...a, visible: action.visible })),
      });

    case 'REORDER_ARTWORK': {
      const art = state.artworks.find(a => a.id === action.id);
      if (!art) return state;
      const layer   = art.layer;
      const same    = state.artworks.filter(a => a.layer === layer);
      const idx     = same.findIndex(a => a.id === action.id);
      const newSame = [...same];
      if (action.dir === 'forward'  && idx < newSame.length - 1) {
        [newSame[idx], newSame[idx + 1]] = [newSame[idx + 1], newSame[idx]];
      } else if (action.dir === 'backward' && idx > 0) {
        [newSame[idx], newSame[idx - 1]] = [newSame[idx - 1], newSame[idx]];
      } else if (action.dir === 'front') {
        newSame.splice(idx, 1);
        newSame.push(art);
      } else if (action.dir === 'back') {
        newSame.splice(idx, 1);
        newSame.unshift(art);
      }
      // Rebuild artworks replacing same-layer items in their original slots
      let si = 0;
      const newArtworks = state.artworks.map(a =>
        a.layer === layer ? newSame[si++] : a
      );
      return withHistory(state, { ...snapshot(state), artworks: newArtworks });
    }


    case 'ADD_TEXT':
      return withHistory(state, { ...snapshot(state), textItems: [...state.textItems, action.item], selected: [], selectedArtwork: null, selectedText: action.item.id });
    case 'UPDATE_TEXT':
      return withHistory(state, { ...snapshot(state), textItems: state.textItems.map(t => t.id === action.id ? { ...t, ...action.patch } : t) });
    case 'DELETE_TEXT':
      return withHistory(state, { ...snapshot(state), textItems: state.textItems.filter(t => t.id !== action.id), selectedText: state.selectedText === action.id ? null : state.selectedText });
    case 'MOVE_TEXT':
      return withHistory(state, { ...snapshot(state), textItems: state.textItems.map(t => t.id === action.id ? { ...t, x: action.x, y: action.y } : t) });
    case 'SELECT_TEXT':
      return { ...state, selectedText: action.id, selectedArtwork: null, selected: action.id !== null ? [] : state.selected };
    case 'ADD_SCALE':
      return withHistory(state, { ...snapshot(state), scaleItems: [...state.scaleItems, action.item] });
    case 'DELETE_SCALE':
      return withHistory(state, { ...snapshot(state), scaleItems: state.scaleItems.filter(sc => sc.id !== action.id) });
    case 'ADD_CUSTOM_PART':
      return withHistory(state, { ...snapshot(state), customParts: [...state.customParts.filter(p => p.name !== action.item.name), action.item] });
    case 'DELETE_CUSTOM_PART':
      return withHistory(state, { ...snapshot(state), customParts: state.customParts.filter(p => p.name !== action.name) });
    case 'IMPORT_CUSTOM_PARTS':
      return withHistory(state, { ...snapshot(state), customParts: action.items });
    case 'RESET_CUSTOM_PARTS':
      return withHistory(state, { ...snapshot(state), customParts: [] });
    case 'SET_LAYER_VISIBILITY':
      return { ...state, layerVisibility: { ...state.layerVisibility, [action.key]: action.value } };
    case 'SET_DEPTH_SETTINGS':
      return { ...state, depthSettings: { ...state.depthSettings, ...action.patch } };

    default:
      return state;
  }
}

const AppStateCtx = createContext<AppState>(null!);
const AppDispatchCtx = createContext<React.Dispatch<AppAction>>(null!);

function AppProvider({ children }: { children: React.ReactNode }) {
  const [state, dispatch] = useReducer(appReducer, undefined, makeInitialState);
  return (
    <AppStateCtx.Provider value={state}>
      <AppDispatchCtx.Provider value={dispatch}>
        {children}
      </AppDispatchCtx.Provider>
    </AppStateCtx.Provider>
  );
}

const useAppState    = () => useContext(AppStateCtx);
const useAppDispatch = () => useContext(AppDispatchCtx);

function GridLayer({ widthMM, heightMM, grid }: {
  widthMM: number; heightMM: number; grid: GridConfig;
}) {
  const lines: React.ReactNode[] = [];
  const minor = grid.size;
  const major = 5;
  const cx = widthMM / 2;
  const cy = heightMM / 2;
  const eps = 1e-6;

  function isMajorFromCenter(offset: number): boolean {
    if (!grid.showMajor) return false;
    const d = Math.abs(offset);
    const nearest = Math.round(d / major) * major;
    return Math.abs(d - nearest) < eps;
  }

  // Grid is anchored to the true panel center, not to the top-left corner.
  // When HP width changes, the center line remains a grid line and all other
  // grid lines are spaced outward from it in both directions.
  for (let i = 0; ; i++) {
    const coords = i === 0 ? [cx] : [cx - i * minor, cx + i * minor];
    let any = false;
    for (const x of coords) {
      if (x < -eps || x > widthMM + eps) continue;
      any = true;
      const isMajor = isMajorFromCenter(x - cx);
      lines.push(
        <line key={`vx${i}-${x.toFixed(4)}`} x1={x} y1={0} x2={x} y2={heightMM}
          stroke={isMajor ? '#2a2a2a' : '#1c1c1c'} strokeWidth={isMajor ? 0.15 : 0.08} />
      );
    }
    if (!any && cx - i * minor < 0 && cx + i * minor > widthMM) break;
  }

  for (let i = 0; ; i++) {
    const coords = i === 0 ? [cy] : [cy - i * minor, cy + i * minor];
    let any = false;
    for (const y of coords) {
      if (y < -eps || y > heightMM + eps) continue;
      any = true;
      const isMajor = isMajorFromCenter(y - cy);
      lines.push(
        <line key={`hy${i}-${y.toFixed(4)}`} x1={0} y1={y} x2={widthMM} y2={y}
          stroke={isMajor ? '#2a2a2a' : '#1c1c1c'} strokeWidth={isMajor ? 0.15 : 0.08} />
      );
    }
    if (!any && cy - i * minor < 0 && cy + i * minor > heightMM) break;
  }
  return <g>{lines}</g>;
}

function MountingHolesLayer({ config }: { config: MountingHoleConfig }) {
  if (!config.enabled) return null;
  return (
    <g>
      {config.holes.map(h => (
        <g key={h.id}>
          <circle cx={h.x} cy={h.y} r={MOUNTING_HOLE_KEEPOUT_R_MM}
            fill="rgba(255,0,0,0.06)" stroke="rgba(255,0,0,0.25)" strokeWidth={0.2} strokeDasharray="0.8 0.4" />
          <circle cx={h.x} cy={h.y} r={MOUNTING_HOLE_DIAMETER_MM / 2}
            fill="#0a0a0a" stroke="#555" strokeWidth={0.3} />
        </g>
      ))}
    </g>
  );
}

function PCBLayer({ pcb }: { pcb: PCBConfig }) {
  if (!pcb.enabled) return null;
  return (
    <rect x={pcb.x} y={pcb.y} width={pcb.width} height={pcb.height}
      fill="none" stroke="#004488" strokeWidth={0.4} strokeDasharray="2 1" />
  );
}

interface ArtworksLayerProps {
  artworks: ArtworkItem[];
  layer: 'background' | 'foreground';
  selectedArtwork: string | null;
  artworkDragPreview: { id: string; x: number; y: number } | null;
  viewMode: ViewMode;
  clipToPanel: boolean;
  widthMM: number;
  heightMM: number;
  ignoreLockedClicks: boolean;
  showInDrill: boolean;
  drillOpacity: number;
  artworkResizePreview: { id: string; x: number; y: number; width: number; height: number } | null;
}

function ArtworksLayer({
  artworks, layer, selectedArtwork, artworkDragPreview,
  viewMode, clipToPanel, widthMM, heightMM, ignoreLockedClicks,
  showInDrill, drillOpacity, artworkResizePreview,
}: ArtworksLayerProps) {
  if (viewMode === 'rear') return null;
  if (viewMode === 'drill' && !showInDrill) return null;

  const clipId = `panel-clip-${layer}`;
  const visible = artworks.filter(a => a.layer === layer && a.visible);
  if (visible.length === 0) return null;

  return (
    <g>
      {clipToPanel && (
        <defs>
          <clipPath id={clipId}>
            <rect x={0} y={0} width={widthMM} height={heightMM} />
          </clipPath>
        </defs>
      )}
      <g clipPath={clipToPanel ? `url(#${clipId})` : undefined}>
        {visible.map(a => {
          const dragPrev   = artworkDragPreview?.id   === a.id ? artworkDragPreview   : null;
          const resizePrev = artworkResizePreview?.id === a.id ? artworkResizePreview : null;
          const cx = resizePrev?.x ?? (dragPrev?.x ?? a.x);
          const cy = resizePrev?.y ?? (dragPrev?.y ?? a.y);
          const w  = resizePrev?.width  ?? a.width;
          const h  = resizePrev?.height ?? a.height;
          const isSel = selectedArtwork === a.id;
          const HS = 1.5; // handle half-size in mm

          return (
            <g key={a.id} data-artwork-id={a.id}
               style={{
                 cursor: a.locked ? 'default' : 'move',
                 pointerEvents: (a.locked && ignoreLockedClicks) ? 'none' : 'auto',
               }}>
              <image
                href={a.imageDataUrl}
                x={cx - w / 2}
                y={cy - h / 2}
                width={w}
                height={h}
                opacity={viewMode === 'drill' ? drillOpacity * a.opacity : a.opacity}
                preserveAspectRatio="none"
                transform={`rotate(${a.rotation}, ${cx}, ${cy})`}
              />
              {isSel && (
                <g transform={`rotate(${a.rotation}, ${cx}, ${cy})`}>
                  <rect
                    x={cx - w / 2 - 1}
                    y={cy - h / 2 - 1}
                    width={w + 2}
                    height={h + 2}
                    fill="none"
                    stroke="#00d4ff"
                    strokeWidth={0.3}
                    strokeDasharray="1.5 0.5"
                    style={{ pointerEvents: 'none' }}
                  />
                  {!a.locked && [
                    ['tl', cx - w / 2, cy - h / 2],
                    ['tr', cx + w / 2, cy - h / 2],
                    ['bl', cx - w / 2, cy + h / 2],
                    ['br', cx + w / 2, cy + h / 2],
                  ].map(([corner, hx, hy]) => (
                    <rect
                      key={corner as string}
                      data-artwork-resize={`${a.id}:${corner}`}
                      x={(hx as number) - HS}
                      y={(hy as number) - HS}
                      width={HS * 2}
                      height={HS * 2}
                      fill="#00d4ff"
                      stroke="#001a2a"
                      strokeWidth={0.2}
                      style={{ cursor: (corner === 'tl' || corner === 'br') ? 'nwse-resize' : 'nesw-resize' }}
                    />
                  ))}
                </g>
              )}
            </g>
          );
        })}
      </g>
    </g>
  );
}


interface TextLayerProps { items: TextItem[]; layer: 'background' | 'foreground'; selectedText: string | null; textDragPreview: { id: string; x: number; y: number } | null; viewMode: ViewMode; }
function TextLayer({ items, layer, selectedText, textDragPreview, viewMode }: TextLayerProps) {
  if (viewMode === 'rear') return null;
  return <g>{items.filter(t => t.layer === layer && t.visible).map(t => { const p = textDragPreview?.id === t.id ? textDragPreview : null; const x = p?.x ?? t.x, y = p?.y ?? t.y; const w = Math.max(6, t.text.length * t.fontSizeMm * 0.6); return <g key={t.id} data-text-id={t.id} transform={`rotate(${t.rotation}, ${x}, ${y})`} style={{ cursor: t.locked ? 'default' : 'move' }}><text x={x} y={y} fontSize={t.fontSizeMm} textAnchor={t.align === 'left' ? 'start' : t.align === 'right' ? 'end' : 'middle'} fill="#ddd" opacity={t.opacity}>{t.text}</text>{selectedText === t.id && <rect x={x-w/2} y={y-t.fontSizeMm} width={w} height={t.fontSizeMm*1.25} fill="none" stroke="#00d4ff" strokeWidth={0.25} strokeDasharray="1.5 0.5" />}</g>; })}</g>;
}
function ScaleLayer({ items, components, layer, viewMode }: { items: ScaleItem[]; components: PlacedComponent[]; layer: 'background' | 'foreground'; viewMode: ViewMode }) {
  if (viewMode === 'rear' || viewMode === 'drill') return null;
  function polar(cx:number,cy:number,r:number,deg:number):[number,number]{ const a=(deg-90)*Math.PI/180; return [cx+Math.cos(a)*r,cy+Math.sin(a)*r]; }
  return <g>{items.filter(s => s.layer === layer && s.visible).map(sc => { const c = sc.componentId ? components.find(x => x.id === sc.componentId) : null; const cx = c?.x ?? sc.x, cy = c?.y ?? sc.y; const ticks: React.ReactNode[] = []; const n = Math.max(2, sc.ticks); for (let i=0;i<n;i++){ const t=i/(n-1); const deg=sc.startAngle+(sc.endAngle-sc.startAngle)*t; const major=i%Math.max(1,sc.majorEvery)===0; const len=sc.tickLength*(major?1.5:1); const [x1,y1]=polar(cx,cy,sc.radius,deg); const [x2,y2]=polar(cx,cy,sc.radius+len,deg); ticks.push(<line key={`t${i}`} x1={x1} y1={y1} x2={x2} y2={y2} stroke="#ddd" strokeWidth={major?0.35:0.2}/>); if(major&&sc.labelMode!=='none'){ const [lx,ly]=polar(cx,cy,sc.radius+len+sc.fontSizeMm*1.2,deg); const label=sc.labelMode==='0-10'?String(Math.round(t*10)):String(Math.round(-5+t*10)); ticks.push(<text key={`l${i}`} x={lx} y={ly} fontSize={sc.fontSizeMm} textAnchor="middle" dominantBaseline="middle" fill="#ddd">{label}</text>); } } return <g key={sc.id}>{ticks}</g>; })}</g>;
}

interface ComponentsLayerProps {
  components: PlacedComponent[];
  selected: string[];
  dragPreview: Map<string, { x: number; y: number }> | null;
  viewMode: ViewMode;
  warnings: CollisionWarning[];
  layers: LayerVisibility;
}

function ComponentsLayer({ components, selected, dragPreview, viewMode, warnings, layers }: ComponentsLayerProps) {
  const warnIds  = new Set(warnings.flatMap(w => w.ids));
  const errorIds = new Set(warnings.filter(w => w.severity === 'error').flatMap(w => w.ids));

  return (
    <g>
      {components.map(c => {
        // Apply live drag preview position
        const preview = dragPreview?.get(c.id);
        const cx = preview?.x ?? c.x;
        const cy = preview?.y ?? c.y;

        const isSel  = selected.includes(c.id);
        const isErr  = errorIds.has(c.id);
        const isWarn = warnIds.has(c.id) && !isErr;

        return (
          <g key={c.id} data-id={c.id} style={{ cursor: 'move' }}>

            {/* Rear keepout zone — rear and combined views */}
            {layers.rearKeepouts && (viewMode === 'rear' || viewMode === 'combined') && c.keepoutW > 0 && (
              <g transform={`rotate(${c.rotation}, ${cx}, ${cy})`}>
                <rect
                  x={cx - c.keepoutW / 2} y={cy - c.keepoutH / 2}
                  width={c.keepoutW} height={c.keepoutH}
                  fill={isErr ? 'rgba(255,50,50,0.25)' : 'rgba(255,160,0,0.2)'}
                  stroke={isErr ? '#ff3333' : '#ffa000'}
                  strokeWidth={0.25} strokeDasharray="1 0.5"
                />
              </g>
            )}

            {/* Rear body — rear view only */}
            {layers.rearBodies && viewMode === 'rear' && c.rearBodyW > 0 && (
              <g transform={`rotate(${c.rotation}, ${cx}, ${cy})`}>
                <rect
                  x={cx - c.rearBodyW / 2} y={cy - c.rearBodyH / 2}
                  width={c.rearBodyW} height={c.rearBodyH}
                  fill={isErr ? 'rgba(255,50,50,0.5)' : 'rgba(255,100,0,0.5)'}
                  stroke={isErr ? '#ff3333' : '#ff6400'}
                  strokeWidth={0.3}
                />
              </g>
            )}

            {/* Front face — circle for normal components, rect for faders */}
            {layers.frontShapes && (viewMode === 'front' || viewMode === 'combined' || viewMode === 'drill') && (
              getFrontShape(c) !== 'circle'
                ? (
                  <g transform={`rotate(${c.rotation}, ${cx}, ${cy})`}>
                    <rect
                      x={cx - getFrontBounds(c).w / 2} y={cy - getFrontBounds(c).h / 2}
                      width={getFrontBounds(c).w} height={getFrontBounds(c).h}
                      fill={isErr ? 'rgba(255,50,50,0.12)' : 'rgba(200,200,200,0.07)'}
                      stroke={isErr ? '#ff3333' : isWarn ? '#ffa000' : '#444'}
                      strokeWidth={0.25}
                    />
                  </g>
                )
                : c.holeType !== 'slot' && (
                  <circle cx={cx} cy={cy} r={c.frontDiameter / 2}
                    fill={isErr ? 'rgba(255,50,50,0.12)' : 'rgba(200,200,200,0.07)'}
                    stroke={isErr ? '#ff3333' : isWarn ? '#ffa000' : '#444'}
                    strokeWidth={0.25}
                  />
                )
            )}

            {/* Knob ergonomic diameter — front and combined views */}
            {layers.frontShapes && (viewMode === 'front' || viewMode === 'combined') && c.knobEnabled && c.knobDiameter && (
              <circle cx={cx} cy={cy} r={c.knobDiameter / 2}
                fill="none"
                stroke={isErr ? '#ff3333' : '#607060'}
                strokeWidth={0.3}
                strokeDasharray="1.5 1"
              />
            )}

            {/* Drill hole — circle or slot (slot respects rotation) */}
            {layers.componentHoles && (viewMode === 'front' || viewMode === 'combined' || viewMode === 'drill') && (
              c.holeType === 'slot'
                ? (
                  <g transform={`rotate(${c.rotation}, ${cx}, ${cy})`}>
                    <rect
                      x={cx - c.holeDiameter / 2} y={cy - (c.slotLength ?? c.holeDiameter) / 2}
                      width={c.holeDiameter} height={c.slotLength ?? c.holeDiameter}
                      rx={c.holeDiameter / 2}
                      fill="#090909" stroke={isSel ? '#00d4ff' : '#888'} strokeWidth={isSel ? 0.4 : 0.3}
                    />
                  </g>
                )
                : <circle cx={cx} cy={cy} r={c.holeDiameter / 2}
                    fill="#090909" stroke={isSel ? '#00d4ff' : '#888'} strokeWidth={isSel ? 0.4 : 0.3}
                  />
            )}

            {/* Coordinate label — drill view only */}
            {viewMode === 'drill' && (
              <text x={cx} y={cy - (c.holeType === 'slot' ? (c.slotLength ?? c.holeDiameter) : c.holeDiameter) / 2 - 1}
                textAnchor="middle" fontSize={1.8} fill="#aaa">
                {cx.toFixed(1)},{cy.toFixed(1)}
              </text>
            )}

            {/* Component label — front and combined views */}
            {(viewMode === 'front' || viewMode === 'combined') && c.label && (
              <text x={cx} y={cy + getFrontBottomOffset(c) + 2.5}
                textAnchor="middle" fontSize={2} fill={isErr ? '#ff8888' : '#aaa'}>
                {c.label}
              </text>
            )}

            {/* Rear label — rear view */}
            {viewMode === 'rear' && (
              <text x={cx} y={cy + 0.8} textAnchor="middle" fontSize={2} fill="#888">
                {c.label || c.name}
              </text>
            )}

            {/* Selection bounding box */}
            {isSel && (
              getFrontShape(c) !== 'circle'
                ? (
                  <g transform={`rotate(${c.rotation}, ${cx}, ${cy})`}>
                    <rect
                      x={cx - getFrontBounds(c).w / 2 - 1} y={cy - getFrontBounds(c).h / 2 - 1}
                      width={getFrontBounds(c).w + 2} height={getFrontBounds(c).h + 2}
                      fill="none" stroke="#00d4ff" strokeWidth={0.25} strokeDasharray="1.5 0.5"
                    />
                  </g>
                )
                : c.holeType === 'slot'
                  ? (
                    <g transform={`rotate(${c.rotation}, ${cx}, ${cy})`}>
                      <rect
                        x={cx - c.holeDiameter / 2 - 1} y={cy - (c.slotLength ?? c.holeDiameter) / 2 - 1}
                        width={c.holeDiameter + 2} height={(c.slotLength ?? c.holeDiameter) + 2}
                        fill="none" stroke="#00d4ff" strokeWidth={0.25} strokeDasharray="1.5 0.5"
                      />
                    </g>
                  )
                  : <rect
                      x={cx - c.frontDiameter / 2 - 1} y={cy - c.frontDiameter / 2 - 1}
                      width={c.frontDiameter + 2} height={c.frontDiameter + 2}
                      fill="none" stroke="#00d4ff" strokeWidth={0.25} strokeDasharray="1.5 0.5"
                    />
            )}

          </g>
        );
      })}
    </g>
  );
}

interface SVGCanvasProps {
  svgRef: React.RefObject<SVGSVGElement>;
  zoom: number;
  pan: { x: number; y: number };
  dragPreview: Map<string, { x: number; y: number }> | null;
  artworkDragPreview: { id: string; x: number; y: number } | null;
  artworkResizePreview: { id: string; x: number; y: number; width: number; height: number } | null;
  textDragPreview: { id: string; x: number; y: number } | null;
  onSVGMouseMove: (e: React.MouseEvent<SVGSVGElement>) => void;
  onSVGMouseDown: (e: React.MouseEvent<SVGSVGElement>) => void;
  onSVGMouseUp:   (e: React.MouseEvent<SVGSVGElement>) => void;
  onSVGTouchStart:(e: React.TouchEvent<SVGSVGElement>) => void;
  onSVGTouchMove: (e: React.TouchEvent<SVGSVGElement>) => void;
  onSVGTouchEnd:  (e: React.TouchEvent<SVGSVGElement>) => void;
  onSVGContextMenu: (e: React.MouseEvent<SVGSVGElement>) => void;
  onWheel:        (e: React.WheelEvent<HTMLDivElement>) => void;
  onWrapMouseDown:(e: React.MouseEvent<HTMLDivElement>) => void;
  coordReadout: string;
  warnings: CollisionWarning[];
}

function SVGCanvas({
  svgRef, zoom, pan, dragPreview, artworkDragPreview, artworkResizePreview, textDragPreview,
  onSVGMouseMove, onSVGMouseDown, onSVGMouseUp,
  onSVGTouchStart, onSVGTouchMove, onSVGTouchEnd, onSVGContextMenu,
  onWheel, onWrapMouseDown,
  coordReadout, warnings,
}: SVGCanvasProps) {
  const state    = useAppState();
  const widthMM  = panelWidthMM(state.panel);
  const heightMM = PANEL_HEIGHT_MM;
  const PAD = 10;

  return (
    <div
      className="canvas-wrap"
      onWheel={onWheel}
      onMouseDown={onWrapMouseDown}
    >
      <div style={{
        transform: `translate(${pan.x}px, ${pan.y}px) scale(${zoom})`,
        transformOrigin: 'center center',
        width: '100%',
        height: '100%',
        display: 'flex',
        alignItems: 'center',
        justifyContent: 'center',
      }}>
        <svg
          ref={svgRef}
          viewBox={`${-PAD} ${-PAD} ${widthMM + PAD * 2} ${heightMM + PAD * 2}`}
          style={{ width: `${(widthMM + PAD * 2) * 4}px`, height: `${(heightMM + PAD * 2) * 4}px`, display: 'block', touchAction: 'none', userSelect: 'none' }}
          onMouseMove={onSVGMouseMove}
          onMouseDown={onSVGMouseDown}
          onMouseUp={onSVGMouseUp}
          onTouchStart={onSVGTouchStart}
          onTouchMove={onSVGTouchMove}
          onTouchEnd={onSVGTouchEnd}
          onTouchCancel={onSVGTouchEnd}
          onContextMenu={onSVGContextMenu}
        >
          {/* Grid */}
          {state.layerVisibility.grid && <GridLayer widthMM={widthMM} heightMM={heightMM} grid={state.grid} />}

          {/* Panel background */}
          <rect x={0} y={0} width={widthMM} height={heightMM} fill="#242424" />

          {/* Background artwork — after fill, before outline so outline stays on top */}
          {state.layerVisibility.artwork && <ArtworksLayer
            artworks={state.artworks}
            layer="background"
            selectedArtwork={state.selectedArtwork}
            artworkDragPreview={artworkDragPreview}
            artworkResizePreview={artworkResizePreview}
            viewMode={state.viewMode}
            clipToPanel={state.clipArtworkToPanel}
            widthMM={widthMM}
            heightMM={heightMM}
            ignoreLockedClicks={state.ignoreLockedArtworkClicks}
            showInDrill={state.showArtworkInDrillView}
            drillOpacity={state.drillArtworkOpacity}
          />}

          {state.layerVisibility.text && <TextLayer items={state.textItems} layer="background" selectedText={state.selectedText} textDragPreview={textDragPreview} viewMode={state.viewMode} />}
          {state.layerVisibility.text && <ScaleLayer items={state.scaleItems} components={state.components} layer="background" viewMode={state.viewMode} />}

          {/* Panel outline — always above background artwork */}
          {state.layerVisibility.panelOutline && <rect x={0} y={0} width={widthMM} height={heightMM}
            fill="none" stroke="#666" strokeWidth={0.5} />}

          {/* Center lines */}
          <line x1={widthMM/2} y1={0} x2={widthMM/2} y2={heightMM}
            stroke="#2a3a2a" strokeWidth={0.1} strokeDasharray="2 2" />
          <line x1={0} y1={heightMM/2} x2={widthMM} y2={heightMM/2}
            stroke="#2a3a2a" strokeWidth={0.1} strokeDasharray="2 2" />

          {/* Mounting holes */}
          {state.layerVisibility.mountingHoles && <MountingHolesLayer config={state.mountingHoles} />}

          {/* PCB outline */}
          {state.layerVisibility.pcb && <PCBLayer pcb={state.pcb} />}

          {/* Components */}
          <ComponentsLayer
            components={state.components}
            selected={state.selected}
            dragPreview={dragPreview}
            viewMode={state.viewMode}
            warnings={warnings}
            layers={state.layerVisibility}
          />

          {state.layerVisibility.text && <ScaleLayer items={state.scaleItems} components={state.components} layer="foreground" viewMode={state.viewMode} />}
          {state.layerVisibility.text && <TextLayer items={state.textItems} layer="foreground" selectedText={state.selectedText} textDragPreview={textDragPreview} viewMode={state.viewMode} />}

          {/* Foreground artwork */}
          {state.layerVisibility.artwork && <ArtworksLayer
            artworks={state.artworks}
            layer="foreground"
            selectedArtwork={state.selectedArtwork}
            artworkDragPreview={artworkDragPreview}
            artworkResizePreview={artworkResizePreview}
            viewMode={state.viewMode}
            clipToPanel={state.clipArtworkToPanel}
            widthMM={widthMM}
            heightMM={heightMM}
            ignoreLockedClicks={state.ignoreLockedArtworkClicks}
            showInDrill={state.showArtworkInDrillView}
            drillOpacity={state.drillArtworkOpacity}
          />}
        </svg>
      </div>

      {coordReadout && (
        <div className="coord-readout">{coordReadout}</div>
      )}
    </div>
  );
}

function sanitizePart(def: ComponentDef): ComponentDef {
  return {
    type: def.type || 'custom', name: def.name || 'Custom Part',
    holeDiameter: Number(def.holeDiameter) || 5, frontDiameter: Number(def.frontDiameter) || Number(def.holeDiameter) || 5,
    rearBodyW: Number(def.rearBodyW) || 0, rearBodyH: Number(def.rearBodyH) || 0, rearDepth: Number(def.rearDepth) || 0,
    keepoutW: Number(def.keepoutW) || Number(def.frontDiameter) || 5, keepoutH: Number(def.keepoutH) || Number(def.frontDiameter) || 5,
    minSpacing: Number(def.minSpacing) || 1, holeType: def.holeType === 'slot' ? 'slot' : undefined,
    slotLength: typeof def.slotLength === 'number' ? def.slotLength : undefined,
    frontShape: def.frontShape === 'rect' || def.frontShape === 'slot' || def.frontShape === 'circle' ? def.frontShape : undefined,
    frontW: typeof def.frontW === 'number' ? def.frontW : undefined, frontH: typeof def.frontH === 'number' ? def.frontH : undefined,
    nutDiameter: def.nutDiameter, washerDiameter: def.washerDiameter, knobDiameter: def.knobDiameter, knobEnabled: !!def.knobEnabled,
    manufacturer: def.manufacturer, partNumber: def.partNumber, datasheetUrl: def.datasheetUrl, category: def.category,
    pinKeepoutW: def.pinKeepoutW, pinKeepoutH: def.pinKeepoutH, panelThicknessMin: def.panelThicknessMin, panelThicknessMax: def.panelThicknessMax,
  };
}

function ComponentLibraryPanel() {
  const dispatch = useAppDispatch();
  const state    = useAppState();
  const widthMM  = panelWidthMM(state.panel);
  const allParts = [...COMPONENT_LIBRARY, ...state.customParts];
  function addComponent(def: ComponentDef) {
    const x = snapToGrid(widthMM / 2, state.grid.size);
    const y = snapToGrid(PANEL_HEIGHT_MM / 2, state.grid.size);
    dispatch({ type: 'ADD_COMPONENT', def, x, y });
  }
  function saveSelectedAsPart() {
    const c = state.components.find(cc => cc.id === state.selected[0]);
    if (!c) return alert('Select one component first.');
    const name = prompt('Custom part name:', c.name + ' custom');
    if (!name) return;
    const { id: _id, label: _label, x: _x, y: _y, rotation: _rot, ...def } = c;
    dispatch({ type: 'ADD_CUSTOM_PART', item: sanitizePart({ ...def, name, type: 'custom', category: def.category ?? 'custom' }) });
  }
  function exportParts() {
    const blob = new Blob([JSON.stringify({ projectVersion: 3, customParts: state.customParts }, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = 'eurorack-parts-library.json'; a.click(); URL.revokeObjectURL(url);
  }
  function importParts(e: React.ChangeEvent<HTMLInputElement>) {
    const file = e.target.files?.[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => { try { const raw = JSON.parse(ev.target!.result as string); const arr = Array.isArray(raw) ? raw : (Array.isArray(raw.customParts) ? raw.customParts : []); dispatch({ type: 'IMPORT_CUSTOM_PARTS', items: arr.map((x: ComponentDef) => sanitizePart(x)) }); } catch { alert('Could not import parts JSON.'); } };
    reader.readAsText(file); e.target.value = '';
  }
  return (
    <div className="section">
      <div className="section-title">Add Component / Parts</div>
      <div className="btn-row" style={{ marginBottom: 6 }}>
        <button onClick={saveSelectedAsPart}>Save selected part</button><button onClick={exportParts} disabled={state.customParts.length === 0}>Export parts</button><button onClick={() => document.getElementById('parts-import-input')!.click()}>Import parts</button><button className="danger" disabled={state.customParts.length === 0} onClick={() => confirm('Reset custom parts?') && dispatch({ type:'RESET_CUSTOM_PARTS' })}>Reset</button>
        <input id="parts-import-input" type="file" accept=".json" style={{ display: 'none' }} onChange={importParts} />
      </div>
      {allParts.map((def, idx) => (
        <div key={`${def.name}-${idx}`} className="comp-lib-item" onClick={() => addComponent(def)}>
          {def.name}<span style={{ color: '#555', fontSize: 10, marginLeft: 6 }}>{def.holeType === 'slot' ? `${def.holeDiameter}×${def.slotLength}mm` : `Ø${def.holeDiameter}mm`}</span>
          {idx >= COMPONENT_LIBRARY.length && <button style={{ float:'right', padding:'0 4px', fontSize:10 }} onClick={e => { e.stopPropagation(); dispatch({ type:'DELETE_CUSTOM_PART', name:def.name }); }}>×</button>}
        </div>
      ))}
    </div>
  );
}

function ArtworkPanel() {
  const state    = useAppState();
  const dispatch = useAppDispatch();
  const widthMM  = panelWidthMM(state.panel);
  const [largeImageWarning, setLargeImageWarning] = useState(false);
  useEffect(() => { if (state.artworks.length === 0) setLargeImageWarning(false); }, [state.artworks.length]);

  function handleFileInput(e: React.ChangeEvent<HTMLInputElement>) {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const dataUrl = ev.target!.result as string;
      setLargeImageWarning(dataUrl.length > 2_000_000);
      const img = new window.Image();
      img.onload = () => {
        const naturalW = img.naturalWidth  || 100;
        const naturalH = img.naturalHeight || 100;
        const defaultWidth  = 20;
        const defaultHeight = defaultWidth * (naturalH / naturalW);
        const item: ArtworkItem = {
          id: crypto.randomUUID(),
          name: file.name,
          imageDataUrl: dataUrl,
          x: snapToGrid(widthMM / 2, state.grid.size),
          y: snapToGrid(PANEL_HEIGHT_MM / 2, state.grid.size),
          width: defaultWidth,
          height: defaultHeight,
          naturalW,
          naturalH,
          rotation: 0,
          opacity: 1,
          locked: false,
          visible: true,
          layer: 'foreground',
          preserveAspectRatio: true,
          notes: '',
        };
        dispatch({ type: 'ADD_ARTWORK', item });
      };
      img.src = dataUrl;
    };
    reader.readAsDataURL(file);
    e.target.value = '';
  }

  const allVisible = state.artworks.length > 0 && state.artworks.every(a => a.visible);

  function toggleAllVisible() {
    dispatch({ type: 'SET_ALL_ARTWORK_VISIBLE', visible: !allVisible });
  }

  return (
    <div className="section">

        accept=".png,.jpg,.jpeg,.svg,.webp"
        style={{ display: 'none' }}
        onChange={handleFileInput}
      />
      {largeImageWarning && (
        <div className="warning-item warn" style={{ marginBottom: 6 }}>
          Large image — JSON/SVG export may be slow.
        </div>
      )}
      <div className="field-row">
        <label>
          <input type="checkbox" checked={state.clipArtworkToPanel}
            onChange={e => dispatch({ type: 'SET_CLIP_ARTWORK', value: e.target.checked })} />
          {' '}Clip artwork to panel
        </label>
      </div>
      <div className="field-row">
        <label>
          <input type="checkbox" checked={state.ignoreLockedArtworkClicks}
            onChange={e => dispatch({ type: 'SET_IGNORE_LOCKED_CLICKS', value: e.target.checked })} />
          {' '}Ignore locked artwork clicks
        </label>
      </div>
      <div className="field-row">
        <label>
          <input type="checkbox" checked={state.showArtworkInDrillView}
            onChange={e => dispatch({ type: 'SET_SHOW_ARTWORK_IN_DRILL', value: e.target.checked })} />
          {' '}Show artwork in drill view
        </label>
      </div>
      {state.showArtworkInDrillView && (
        <div className="field-row">
          <label>Drill artwork opacity</label>
          <input type="number" step={0.05} min={0} max={1}
            value={state.drillArtworkOpacity}
            onChange={e => dispatch({ type: 'SET_DRILL_ARTWORK_OPACITY', value: Math.max(0, Math.min(1, +e.target.value)) })} />
        </div>
      )}
      {state.artworks.length > 0 && (
        <div className="field-row">
          <label>
            <input type="checkbox" checked={allVisible} onChange={toggleAllVisible} />
            {' '}Show all artwork
          </label>
        </div>
      )}
      {state.artworks.map(a => (
        <div key={a.id}
          style={{
            display: 'flex', alignItems: 'center', gap: 3,
            padding: '3px 4px',
            borderBottom: '1px solid #222', fontSize: 10,
            background: state.selectedArtwork === a.id ? 'rgba(0,212,255,0.08)' : 'transparent',
          }}>
          {/* Layer toggle */}
          <button title={a.layer === 'background' ? 'Background (click to move to foreground)' : 'Foreground (click to move to background)'}
            style={{ padding: '1px 3px', fontSize: 9, minWidth: 18, background: 'transparent', border: '1px solid #333' }}
            onClick={() => dispatch({ type: 'UPDATE_ARTWORK', id: a.id, patch: { layer: a.layer === 'background' ? 'foreground' : 'background' } })}>
            {a.layer === 'background' ? '▼' : '▲'}
          </button>

            flex: 1, cursor: 'pointer', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap',

      ))}

  );

function downscaleArtworkImage(
  dataUrl: string,
  maxPx: number,
  naturalW: number,
  naturalH: number,
  cb: (newDataUrl: string, newW: number, newH: number) => void
) {
  const img = new window.Image();
  img.onload = () => {
    const scale = Math.min(1, maxPx / Math.max(naturalW, naturalH));
    if (scale >= 1) { cb(dataUrl, naturalW, naturalH); return; }
    const w = Math.round(naturalW * scale);
    const h = Math.round(naturalH * scale);
    const canvas = document.createElement('canvas');
    canvas.width  = w;
    canvas.height = h;
    const ctx = canvas.getContext('2d')!;
    ctx.drawImage(img, 0, 0, w, h);
    cb(canvas.toDataURL('image/png'), w, h);
  };
  img.src = dataUrl;
}

function ArtworkPropertiesPanel() {
  const state    = useAppState();
  const dispatch = useAppDispatch();
  const art = state.artworks.find(a => a.id === state.selectedArtwork);
  if (!art) return null;

  const patch = (p: Partial<ArtworkItem>) =>
    dispatch({ type: 'UPDATE_ARTWORK', id: art.id, patch: p });

  const widthMM   = panelWidthMM(state.panel);
  const heightMM  = PANEL_HEIGHT_MM;

  function centerOnPanel() {
    patch({ x: widthMM / 2, y: heightMM / 2 });
  }
  function fitToPanel() {
    patch({ x: widthMM / 2, y: heightMM / 2, width: widthMM, height: heightMM });
  }
  function fitToWidth() {
    const scale = widthMM / art.width;
    patch({ x: widthMM / 2, y: heightMM / 2, width: widthMM, height: art.height * scale });
  }
  function fitToHeight() {
    const scale = heightMM / art.height;
    patch({ x: widthMM / 2, y: heightMM / 2, width: art.width * scale, height: heightMM });
  }

  function setWidth(w: number) {
    if (art.preserveAspectRatio && art.naturalW > 0) {
      patch({ width: w, height: w * (art.naturalH / art.naturalW) });
    } else {
      patch({ width: w });
    }
  }

  function setHeight(h: number) {
    if (art.preserveAspectRatio && art.naturalH > 0) {
      patch({ height: h, width: h * (art.naturalW / art.naturalH) });
    } else {
      patch({ height: h });
    }
  }

  return (
    <div className="section">
      <div className="section-title">Image</div>

      <div className="field-row">
        <label>Name</label>
        <input type="text" value={art.name}
          onChange={e => patch({ name: e.target.value })} />
      </div>

      <div className="field-pair">
        <NumField label="X (mm)" value={art.x} onChange={v => patch({ x: v })} />
        <NumField label="Y (mm)" value={art.y} onChange={v => patch({ y: v })} />
      </div>

      <div className="field-pair">
        <NumField label="W (mm)" value={art.width}  min={0.1} onChange={setWidth} />
        <NumField label="H (mm)" value={art.height} min={0.1} onChange={setHeight} />
      </div>

function MeasurementsPanel() {
  const state    = useAppState();
  const widthMM  = panelWidthMM(state.panel);
  const selComps = state.components.filter(c => state.selected.includes(c.id));
  const maxDepth = computeMaxDepth(state.components);

  const artworkBytes = state.artworks.reduce((sum, a) => sum + a.imageDataUrl.length, 0);
  const artworkKB    = artworkBytes / 1024;
  const estimatedJSONKB = artworkKB + state.components.length * 0.5 + 2;
  const jsonWarning  = estimatedJSONKB > 5120;

  const rows: [string, string][] = [
    ['Panel width',   `${widthMM.toFixed(2)} mm`],
    ['Panel height',  `${PANEL_HEIGHT_MM} mm`],
    ['Max rear depth', maxDepth > 0 ? `${maxDepth.toFixed(1)} mm` : '—'],
    ['Components',    String(state.components.length)],
    ['Artworks',      String(state.artworks.length)],
    ['Artwork size', artworkKB > 1024
      ? `${(artworkKB / 1024).toFixed(1)} MB`
      : `${artworkKB.toFixed(0)} KB`],
  ];

  if (selComps.length === 1) {
    const c = selComps[0];
    rows.push(
      ['Selected X',  `${c.x.toFixed(2)} mm`],
      ['Selected Y',  `${c.y.toFixed(2)} mm`],
      ['Rear depth',  `${c.rearDepth.toFixed(1)} mm`],
      ['Hole Ø',      `${c.holeDiameter.toFixed(1)} mm`],
    );
  }

  if (selComps.length === 2) {
    const [a, b] = selComps;
    rows.push(
      ['Center dist', `${distanceBetween(a, b).toFixed(2)} mm`],
      ['Edge gap',    `${edgeClearance(a, b).toFixed(2)} mm`],
    );
  }

  return (
    <div className="section">
      <div className="section-title">Measurements</div>
      {rows.map(([k, v]) => (
        <div key={k} className="measurement-row">
          <span>{k}</span><span>{v}</span>
        </div>
      ))}
      {jsonWarning && (
        <div className="warning-item warn" style={{ marginTop: 6, fontSize: 10 }}>
          Estimated JSON export &gt;5 MB. Consider downscaling images.
        </div>
      )}
    </div>
  );
}

function LayoutStatusPanel({ warnings, components }: {
  warnings: CollisionWarning[];
  components: PlacedComponent[];
}) {
  const errors = warnings.filter(w => w.severity === 'error').length;
  const warns  = warnings.filter(w => w.severity === 'warn').length;

  let minFrontClear = Infinity;
  let minKOClear    = Infinity;
  for (let i = 0; i < components.length; i++) {
    for (let j = i + 1; j < components.length; j++) {
      const a = components[i], b = components[j];
      const fc = edgeClearance(a, b);
      if (fc < minFrontClear) minFrontClear = fc;

      const dist = Math.hypot(b.x - a.x, b.y - a.y);
      const aR = Math.hypot(a.keepoutW / 2, a.keepoutH / 2);
      const bR = Math.hypot(b.keepoutW / 2, b.keepoutH / 2);
      const kc = dist - aR - bR;
      if (kc < minKOClear) minKOClear = kc;
    }
  }

  const maxDepth = computeMaxDepth(components);
  const status = errors > 0 ? 'Collision' : warns > 0 ? 'Warning' : 'OK';
  const statusColor = errors > 0 ? '#ff3333' : warns > 0 ? '#ffa000' : '#3a7a3a';

  return (
    <div className="section">
      <div className="section-title" style={{ display: 'flex', justifyContent: 'space-between' }}>
        <span>Layout Status</span>
        <span style={{ color: statusColor, fontWeight: 700 }}>{status}</span>
      </div>
      <div className="measurement-row">
        <span>Hard collisions</span>
        <span style={{ color: errors > 0 ? '#ff3333' : '#3a7a3a' }}>{errors}</span>
      </div>
      <div className="measurement-row">
        <span>Warnings</span>
        <span style={{ color: warns > 0 ? '#ffa000' : '#3a7a3a' }}>{warns}</span>
      </div>
      <div className="measurement-row">
        <span>Min front clearance</span>
        <span>{components.length >= 2 ? `${minFrontClear.toFixed(1)} mm` : '—'}</span>
      </div>
      <div className="measurement-row">
        <span>Min KO clearance</span>
        <span>{components.length >= 2 ? `${minKOClear.toFixed(1)} mm` : '—'}</span>
      </div>
      <div className="measurement-row">
        <span>Max rear depth</span>
        <span>{maxDepth > 0 ? `${maxDepth.toFixed(1)} mm` : '—'}</span>
      </div>
    </div>
  );
}

type ValidationResult =
  | { ok: true;  state: Omit<AppState, 'history' | 'future'>; repairs: string[] }
  | { ok: false; error: string };

function validateAndNormalize(raw: unknown): ValidationResult {
  if (!raw || typeof raw !== 'object' || Array.isArray(raw)) {
    return { ok: false, error: 'Root must be a JSON object.' };
  }
  const obj = raw as Record<string, unknown>;
  const _projectVersion: number = typeof obj.projectVersion === 'number' ? obj.projectVersion : 1;
  // _projectVersion is available for future migration logic
  if (!obj.panel || typeof obj.panel !== 'object') {
    return { ok: false, error: 'Missing required field: panel.' };
  }
  if (!Array.isArray(obj.components)) {
    return { ok: false, error: 'Missing required field: components (must be array).' };
  }

  const repairs: string[] = [];
  const panelRaw = obj.panel as Record<string, unknown>;
  const panel: PanelConfig = {
    widthHP:  typeof panelRaw.widthHP  === 'number'  ? panelRaw.widthHP  : (repairs.push('panel.widthHP defaulted to 8'), 8),
    customHP: typeof panelRaw.customHP === 'boolean' ? panelRaw.customHP : false,
  };
  const widthMM = panelWidthMM(panel);

  const components: PlacedComponent[] = [];
  for (let i = 0; i < (obj.components as unknown[]).length; i++) {
    const rc = (obj.components as unknown[])[i];
    if (!rc || typeof rc !== 'object' || Array.isArray(rc)) {
      repairs.push(`Component ${i}: skipped (not an object).`);
      continue;
    }
    const r = rc as Record<string, unknown>;
    const libMatch = COMPONENT_LIBRARY.find(d => d.type === r.type) ?? COMPONENT_LIBRARY[0];

    function num(key: string, fallback: number): number {
      return typeof r[key] === 'number' ? (r[key] as number) : fallback;
    }
    function str(key: string, fallback: string): string {
      return typeof r[key] === 'string' ? (r[key] as string) : fallback;
    }
    function bool(key: string, fallback: boolean): boolean {
      return typeof r[key] === 'boolean' ? (r[key] as boolean) : fallback;
    }

    const id = str('id', '');
    if (!id) repairs.push(`Component ${i} "${str('label', libMatch.name)}": generated new ID.`);

    const comp: PlacedComponent = {
      ...libMatch,
      id:            id || crypto.randomUUID(),
      label:         str('label', str('name', libMatch.name)),
      type:          str('type', libMatch.type) as ComponentType,
      name:          str('name', libMatch.name),
      x:             num('x', 20),
      y:             num('y', 64),
      rotation:      num('rotation', 0),
      notes:         str('notes', ''),
      holeDiameter:  num('holeDiameter', libMatch.holeDiameter),
      frontDiameter: num('frontDiameter', libMatch.frontDiameter),
      rearBodyW:     num('rearBodyW', libMatch.rearBodyW),
      rearBodyH:     num('rearBodyH', libMatch.rearBodyH),
      rearDepth:     num('rearDepth', libMatch.rearDepth),
      keepoutW:      num('keepoutW', libMatch.keepoutW),
      keepoutH:      num('keepoutH', libMatch.keepoutH),
      minSpacing:    num('minSpacing', libMatch.minSpacing),
      holeType:      r.holeType === 'slot' || libMatch.holeType === 'slot' ? 'slot' : undefined,
      slotLength:    typeof r.slotLength === 'number' ? (r.slotLength as number) : libMatch.slotLength,
      frontShape:    (r.frontShape === 'rect' || r.frontShape === 'slot' || r.frontShape === 'circle')
                      ? r.frontShape as 'circle' | 'rect' | 'slot'
                      : (libMatch.frontShape ?? (libMatch.holeType === 'slot' ? 'slot' : 'circle')),
      nutDiameter:   typeof r.nutDiameter    === 'number' ? (r.nutDiameter    as number) : undefined,
      washerDiameter:typeof r.washerDiameter === 'number' ? (r.washerDiameter as number) : undefined,
      knobDiameter:  typeof r.knobDiameter   === 'number' ? (r.knobDiameter   as number) : undefined,
      knobEnabled:   bool('knobEnabled', false),
      manufacturer:  typeof r.manufacturer === 'string' ? r.manufacturer as string : libMatch.manufacturer,
      partNumber:    typeof r.partNumber === 'string' ? r.partNumber as string : libMatch.partNumber,
      datasheetUrl:  typeof r.datasheetUrl === 'string' ? r.datasheetUrl as string : libMatch.datasheetUrl,
      category:      typeof r.category === 'string' ? r.category as any : libMatch.category,
      pinKeepoutW:   typeof r.pinKeepoutW === 'number' ? r.pinKeepoutW as number : libMatch.pinKeepoutW,
      pinKeepoutH:   typeof r.pinKeepoutH === 'number' ? r.pinKeepoutH as number : libMatch.pinKeepoutH,
      panelThicknessMin: typeof r.panelThicknessMin === 'number' ? r.panelThicknessMin as number : libMatch.panelThicknessMin,
      panelThicknessMax: typeof r.panelThicknessMax === 'number' ? r.panelThicknessMax as number : libMatch.panelThicknessMax,
      frontW:        typeof r.frontW === 'number' ? r.frontW : libMatch.frontW,
      frontH:        typeof r.frontH === 'number' ? r.frontH : libMatch.frontH,
    };
    components.push(comp);
  }

  function objOrDefault<T>(key: string, fallback: T): T {
    return obj[key] && typeof obj[key] === 'object' && !Array.isArray(obj[key])
      ? (obj[key] as T)
      : fallback;
  }

  const customParts: ComponentDef[] = Array.isArray(obj.customParts)
    ? (obj.customParts as ComponentDef[]).map(p => sanitizePart(p))
    : [];

  const artworks: ArtworkItem[] = [];
  if (Array.isArray(obj.artworks)) {
    for (let i = 0; i < (obj.artworks as unknown[]).length; i++) {
      const ra = (obj.artworks as unknown[])[i];
      if (!ra || typeof ra !== 'object' || Array.isArray(ra)) {
        repairs.push(`Artwork ${i}: skipped (not an object).`);
        continue;
      }
      const r = ra as Record<string, unknown>;
      if (typeof r.id !== 'string' || !r.id) {
        repairs.push(`Artwork ${i}: skipped (missing id).`);
        continue;
      }
      if (typeof r.imageDataUrl !== 'string' || !r.imageDataUrl.startsWith('data:')) {
        repairs.push(`Artwork ${i} "${r.id}": skipped (invalid imageDataUrl).`);
        continue;
      }
      artworks.push({
        id:                  r.id as string,
        name:                typeof r.name    === 'string'  ? r.name    : 'image',
        imageDataUrl:        r.imageDataUrl   as string,
        x:                   typeof r.x       === 'number'  ? r.x       : widthMM / 2,
        y:                   typeof r.y       === 'number'  ? r.y       : PANEL_HEIGHT_MM / 2,
        width:               typeof r.width   === 'number'  ? r.width   : 20,
        height:              typeof r.height  === 'number'  ? r.height  : 20,
        naturalW:            typeof r.naturalW  === 'number' ? r.naturalW  : 100,
        naturalH:            typeof r.naturalH  === 'number' ? r.naturalH  : 100,
        rotation:            typeof r.rotation  === 'number' ? r.rotation  : 0,
        opacity:             typeof r.opacity   === 'number' ? r.opacity   : 1,
        locked:              typeof r.locked    === 'boolean'? r.locked    : false,
        visible:             typeof r.visible   === 'boolean'? r.visible   : true,
        layer:               r.layer === 'background' ? 'background' : 'foreground',
        preserveAspectRatio: typeof r.preserveAspectRatio === 'boolean' ? r.preserveAspectRatio : true,
        notes:               typeof r.notes === 'string' ? r.notes : '',
      });
    }
  }

  const textItems: TextItem[] = Array.isArray(obj.textItems) ? (obj.textItems as any[]).filter(t => t && typeof t === 'object').map((t:any)=>({ id:typeof t.id==='string'?t.id:crypto.randomUUID(), text:typeof t.text==='string'?t.text:'TEXT', x:typeof t.x==='number'?t.x:widthMM/2, y:typeof t.y==='number'?t.y:PANEL_HEIGHT_MM/2, rotation:typeof t.rotation==='number'?t.rotation:0, fontSizeMm:typeof t.fontSizeMm==='number'?t.fontSizeMm:3, align:t.align==='left'||t.align==='right'||t.align==='center'?t.align:'center', layer:t.layer==='background'?'background':'foreground', locked:!!t.locked, visible:t.visible!==false, opacity:typeof t.opacity==='number'?Math.max(0,Math.min(1,t.opacity)):1 })) : [];
  const scaleItems: ScaleItem[] = Array.isArray(obj.scaleItems) ? (obj.scaleItems as any[]).filter(sc => sc && typeof sc === 'object').map((sc:any)=>({ id:typeof sc.id==='string'?sc.id:crypto.randomUUID(), componentId:typeof sc.componentId==='string'?sc.componentId:null, x:typeof sc.x==='number'?sc.x:widthMM/2, y:typeof sc.y==='number'?sc.y:PANEL_HEIGHT_MM/2, radius:typeof sc.radius==='number'?sc.radius:10, startAngle:typeof sc.startAngle==='number'?sc.startAngle:-135, endAngle:typeof sc.endAngle==='number'?sc.endAngle:135, ticks:typeof sc.ticks==='number'?sc.ticks:11, majorEvery:typeof sc.majorEvery==='number'?sc.majorEvery:2, tickLength:typeof sc.tickLength==='number'?sc.tickLength:2, labelMode:sc.labelMode==='0-10'||sc.labelMode==='-5+5'?sc.labelMode:'none', fontSizeMm:typeof sc.fontSizeMm==='number'?sc.fontSizeMm:2, layer:sc.layer==='background'?'background':'foreground', visible:sc.visible!==false, locked:!!sc.locked })) : [];

  const clipArtworkToPanel = typeof obj.clipArtworkToPanel === 'boolean'
    ? obj.clipArtworkToPanel : true;
  const ignoreLockedArtworkClicks = typeof obj.ignoreLockedArtworkClicks === 'boolean'
    ? obj.ignoreLockedArtworkClicks : false;
  const showArtworkInDrillView = typeof obj.showArtworkInDrillView === 'boolean'
    ? obj.showArtworkInDrillView : false;
  const drillArtworkOpacity = typeof obj.drillArtworkOpacity === 'number'
    ? Math.max(0, Math.min(1, obj.drillArtworkOpacity)) : 0.3;

  const normalized: Omit<AppState, 'history' | 'future'> = {
    panel,
    components,
    artworks,
    textItems,
    scaleItems,
    customParts,
    selected: [],
    selectedArtwork: null,
    selectedText: null,
    viewMode: (['front','rear','drill','combined'] as ViewMode[]).includes(obj.viewMode as ViewMode)
      ? (obj.viewMode as ViewMode)
      : 'front',
    grid: objOrDefault<GridConfig>('grid', { size: 1, showMajor: true }),
    pcb: objOrDefault<PCBConfig>('pcb', { enabled: false, x: 0, y: 9, width: widthMM, height: 110, depthLimit: 50 }),
    mountingHoles: objOrDefault<MountingHoleConfig>('mountingHoles', { enabled: true, holes: defaultMountingHoles(widthMM) }),
    clipArtworkToPanel,
    ignoreLockedArtworkClicks,
    showArtworkInDrillView,
    drillArtworkOpacity,
    layerVisibility: { ...defaultLayerVisibility(), ...(obj.layerVisibility && typeof obj.layerVisibility === 'object' ? obj.layerVisibility as Partial<LayerVisibility> : {}) },
    depthSettings: { caseDepthLimitMm: 45, pcbDistanceBehindPanelMm: 12, showPCBPlane: true, ...(obj.depthSettings && typeof obj.depthSettings === 'object' ? obj.depthSettings as Partial<DepthSettings> : {}) },
  };

  return { ok: true, state: normalized, repairs };
}
