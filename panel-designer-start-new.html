function buildArtworkSVGLines(
  artworks: ArtworkItem[],
  layer: 'background' | 'foreground',
  widthMM: number,
  heightMM: number,
  clip: boolean
): string[] {
  const visible = artworks.filter(a => a.layer === layer && a.visible);
  if (visible.length === 0) return [];
  const out: string[] = [];
  const clipId = `export-clip-${layer}`;
  if (clip) {
    out.push(`  <defs><clipPath id="${clipId}"><rect x="0" y="0" width="${widthMM.toFixed(3)}" height="${heightMM.toFixed(3)}"/></clipPath></defs>`);
  }
  out.push(`  <g${clip ? ` clip-path="url(#${clipId})"` : ''}>`);
  for (const a of visible) {
    const x = (a.x - a.width  / 2).toFixed(3);
    const y = (a.y - a.height / 2).toFixed(3);
    const transform = a.rotation !== 0
      ? ` transform="rotate(${a.rotation}, ${a.x.toFixed(3)}, ${a.y.toFixed(3)})"`
      : '';
    out.push(`    <image href="${a.imageDataUrl}" x="${x}" y="${y}" width="${a.width.toFixed(3)}" height="${a.height.toFixed(3)}" opacity="${a.opacity}" preserveAspectRatio="none"${transform}/>`);
  }
  out.push(`  </g>`);
  return out;
}

function buildTextSVGLines(items: TextItem[], layer: 'background'|'foreground'): string[] { return items.filter(t=>t.layer===layer&&t.visible).map(t=>{ const anchor=t.align==='left'?'start':t.align==='right'?'end':'middle'; const rot=t.rotation?` transform="rotate(${t.rotation}, ${t.x.toFixed(3)}, ${t.y.toFixed(3)})"`:''; return `  <text x="${t.x.toFixed(3)}" y="${t.y.toFixed(3)}" font-size="${t.fontSizeMm.toFixed(3)}" text-anchor="${anchor}" opacity="${t.opacity}" fill="#111"${rot}>${t.text.replace(/&/g,'&amp;').replace(/</g,'&lt;')}</text>`; }); }
function exportCSVDrillTable(state: AppState, warnings: CollisionWarning[]) { const warnCount=(id:string)=>warnings.filter(w=>w.ids.includes(id)).length; const header=['Label','Type','Name','Manufacturer','Part number','X mm','Y mm','Rotation deg','Hole type','Hole diameter','Slot length','Front shape','Front W','Front H','Rear body W','Rear body H','Rear depth','Keepout W','Keepout H','Warning count']; const rows=state.components.map(c=>{ const b=getFrontBounds(c); return [c.label||c.name,c.type,c.name,c.manufacturer||'',c.partNumber||'',c.x.toFixed(3),c.y.toFixed(3),c.rotation.toFixed(1),c.holeType||'circle',c.holeDiameter,c.slotLength||'',getFrontShape(c),b.w,b.h,c.rearBodyW,c.rearBodyH,c.rearDepth,c.keepoutW,c.keepoutH,warnCount(c.id)].map(v=>`"${String(v).replace(/"/g,'""')}"`).join(','); }); const blob=new Blob([[header.join(','),...rows].join('\n')],{type:'text/csv'}); const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download='drill-table.csv'; a.click(); URL.revokeObjectURL(url); }
function exportSVGMode(state: AppState, mode: 'preview'|'drill'|'artwork'|'debug', warnings: CollisionWarning[]) { if(mode==='drill') return exportSVG(state,{drillOnly:true,labels:false,rearKeepout:false,rearBody:false,centerMarks:true,mountingKeepouts:true,includeArtwork:false}); if(mode==='artwork') return exportSVG(state,{drillOnly:false,labels:true,rearKeepout:false,rearBody:false,centerMarks:false,mountingKeepouts:false,includeArtwork:true}); if(mode==='debug') return exportSVG(state,{drillOnly:false,labels:true,rearKeepout:true,rearBody:true,centerMarks:true,mountingKeepouts:true,includeArtwork:true}); return exportSVG(state,{drillOnly:false,labels:true,rearKeepout:false,rearBody:false,centerMarks:true,mountingKeepouts:true,includeArtwork:true}); }

function exportSVG(state: AppState, opts: ExportOptions) {
  const widthMM  = panelWidthMM(state.panel);
  const heightMM = PANEL_HEIGHT_MM;

  function escapeXml(s: string): string {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  const lines: string[] = [];

  if (opts.mountingKeepouts && state.mountingHoles.enabled) {
    for (const h of state.mountingHoles.holes) {
      if (!opts.drillOnly) {
        lines.push(`  <circle cx="${h.x.toFixed(3)}" cy="${h.y.toFixed(3)}" r="${MOUNTING_HOLE_KEEPOUT_R_MM.toFixed(3)}" fill="none" stroke="#aaa" stroke-width="0.2" stroke-dasharray="1 0.5"/>`);
      }
      lines.push(`  <circle cx="${h.x.toFixed(3)}" cy="${h.y.toFixed(3)}" r="${(MOUNTING_HOLE_DIAMETER_MM/2).toFixed(3)}" fill="white" stroke="#333" stroke-width="0.3"/>`);
    }
  }

  for (const c of state.components) {
    lines.push(`  <!-- ${escapeXml(c.label || c.name)} | ${c.type} | x=${c.x.toFixed(2)} y=${c.y.toFixed(2)} | hole Ø${c.holeDiameter}mm${c.holeType === 'slot' ? ` slot ${c.holeDiameter}×${c.slotLength ?? '?'}mm` : ''} | depth ${c.rearDepth}mm -->`);

    if (!opts.drillOnly) {
      if (opts.rearKeepout && c.keepoutW > 0) {
        lines.push(`  <g transform="rotate(${c.rotation}, ${c.x.toFixed(3)}, ${c.y.toFixed(3)})">`);
        lines.push(`    <rect x="${(c.x - c.keepoutW/2).toFixed(3)}" y="${(c.y - c.keepoutH/2).toFixed(3)}" width="${c.keepoutW.toFixed(3)}" height="${c.keepoutH.toFixed(3)}" fill="none" stroke="#f80" stroke-width="0.2" stroke-dasharray="1 0.5"/>`);
        lines.push(`  </g>`);
      }
      if (opts.rearBody && c.rearBodyW > 0) {
        lines.push(`  <g transform="rotate(${c.rotation}, ${c.x.toFixed(3)}, ${c.y.toFixed(3)})">`);
        lines.push(`    <rect x="${(c.x - c.rearBodyW/2).toFixed(3)}" y="${(c.y - c.rearBodyH/2).toFixed(3)}" width="${c.rearBodyW.toFixed(3)}" height="${c.rearBodyH.toFixed(3)}" fill="none" stroke="#f60" stroke-width="0.3"/>`);
        lines.push(`  </g>`);
      }
      if (getFrontShape(c) !== 'circle') {
        const b = getFrontBounds(c);
        const rot = c.rotation !== 0 ? ` transform="rotate(${c.rotation}, ${c.x.toFixed(3)}, ${c.y.toFixed(3)})"` : '';
        lines.push(`  <rect x="${(c.x - b.w/2).toFixed(3)}" y="${(c.y - b.h/2).toFixed(3)}" width="${b.w.toFixed(3)}" height="${b.h.toFixed(3)}" fill="none" stroke="#999" stroke-width="0.25"${rot}/>`);
      } else {
        lines.push(`  <circle cx="${c.x.toFixed(3)}" cy="${c.y.toFixed(3)}" r="${(c.frontDiameter/2).toFixed(3)}" fill="none" stroke="#999" stroke-width="0.25"/>`);
      }
    }

    if (c.holeType === 'slot') {
      const sl = c.slotLength ?? c.holeDiameter;
      const rot = c.rotation !== 0 ? ` transform="rotate(${c.rotation}, ${c.x.toFixed(3)}, ${c.y.toFixed(3)})"` : '';
      lines.push(`  <rect x="${(c.x - c.holeDiameter/2).toFixed(3)}" y="${(c.y - sl/2).toFixed(3)}" width="${c.holeDiameter.toFixed(3)}" height="${sl.toFixed(3)}" rx="${(c.holeDiameter/2).toFixed(3)}" fill="white" stroke="#333" stroke-width="0.3"${rot}/>`);
    } else {
      lines.push(`  <circle cx="${c.x.toFixed(3)}" cy="${c.y.toFixed(3)}" r="${(c.holeDiameter/2).toFixed(3)}" fill="white" stroke="#333" stroke-width="0.3"/>`);
    }

    if (opts.centerMarks && !opts.drillOnly) {
      const cm = 1.5;
      lines.push(`  <line x1="${(c.x-cm).toFixed(3)}" y1="${c.y.toFixed(3)}" x2="${(c.x+cm).toFixed(3)}" y2="${c.y.toFixed(3)}" stroke="#555" stroke-width="0.12"/>`);
      lines.push(`  <line x1="${c.x.toFixed(3)}" y1="${(c.y-cm).toFixed(3)}" x2="${c.x.toFixed(3)}" y2="${(c.y+cm).toFixed(3)}" stroke="#555" stroke-width="0.12"/>`);
    }

    if (opts.labels && !opts.drillOnly) {
      const ly = (c.y + getFrontBottomOffset(c) + 2.5).toFixed(3);
      lines.push(`  <text x="${c.x.toFixed(3)}" y="${ly}" text-anchor="middle" font-size="2" fill="#333">${escapeXml(c.label || c.name)}</text>`);
    }
  }

  const bgArtLines = (opts.includeArtwork && !opts.drillOnly)
    ? buildArtworkSVGLines(state.artworks, 'background', widthMM, heightMM, state.clipArtworkToPanel)
    : [];
  const fgArtLines = (opts.includeArtwork && !opts.drillOnly)
    ? buildArtworkSVGLines(state.artworks, 'foreground', widthMM, heightMM, state.clipArtworkToPanel)
    : [];
  const bgTextLines = !opts.drillOnly ? buildTextSVGLines(state.textItems, 'background') : [];
  const fgTextLines = !opts.drillOnly ? buildTextSVGLines(state.textItems, 'foreground') : [];

  const svg = `<?xml version="1.0" encoding="UTF-8"?>
<!-- Eurorack Panel Designer export -->
<!-- Panel: ${state.panel.widthHP}HP = ${widthMM.toFixed(2)}mm x ${heightMM}mm -->
<!-- WARNING: Dimensions are planning estimates. Verify all parts with datasheets/calipers before manufacturing. -->
<svg xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 ${widthMM.toFixed(3)} ${heightMM.toFixed(3)}"
  width="${widthMM.toFixed(3)}mm" height="${heightMM.toFixed(3)}mm">
  <rect x="0" y="0" width="${widthMM.toFixed(3)}" height="${heightMM.toFixed(3)}" fill="#ccc"/>
${bgArtLines.join('\n')}${bgArtLines.length ? '\n' : ''}${bgTextLines.join('\n')}${bgTextLines.length ? '\n' : ''}  <rect x="0" y="0" width="${widthMM.toFixed(3)}" height="${heightMM.toFixed(3)}" fill="none" stroke="black" stroke-width="0.5"/>
${lines.join('\n')}
${fgTextLines.length ? fgTextLines.join('\n') + '\n' : ''}${fgArtLines.length ? fgArtLines.join('\n') + '\n' : ''}</svg>`;

  const blob = new Blob([svg], { type: 'image/svg+xml' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = 'panel.svg'; a.click();
  URL.revokeObjectURL(url);
}

function fallbackCopy(text: string) {
  const el = document.createElement('textarea');
  el.value = text;
  el.style.position = 'fixed'; el.style.opacity = '0';
  document.body.appendChild(el);
  el.select();
  document.execCommand('copy');
  document.body.removeChild(el);
}

function copyTable(components: PlacedComponent[]) {
  const header = 'Name\tType\tX (mm)\tY (mm)\tHole Ø (mm)\tFront Ø (mm)\tRear Depth (mm)';
  const rows   = components.map(c =>
    [c.label || c.name, c.type, c.x.toFixed(2), c.y.toFixed(2),
     c.holeDiameter.toFixed(1), c.frontDiameter.toFixed(1), c.rearDepth.toFixed(1)].join('\t')
  );
  const text = [header, ...rows].join('\n');
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text).catch(() => fallbackCopy(text));
  } else {
    fallbackCopy(text);
  }
}

function ExportDialog({ options, onChange, onExport, onExportMode, onExportCSV, onCancel }: { options: ExportOptions; onChange: (o: ExportOptions) => void; onExport: () => void; onExportMode: (mode: 'preview'|'drill'|'artwork'|'debug') => void; onExportCSV: () => void; onCancel: () => void; }) {

  return <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.75)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:1000}}><div style={{background:'#1a1a1a',border:'1px solid #444',borderRadius:6,padding:20,minWidth:330}}><div style={{fontWeight:700,marginBottom:10,fontSize:13,color:'#e0e0e0'}}>Export</div><div className="section-title">Quick modes</div><div className="btn-row" style={{marginBottom:12}}><button onClick={()=>onExportMode('preview')}>Preview SVG</button><button onClick={()=>onExportMode('drill')}>Drill/Cut SVG</button><button onClick={()=>onExportMode('artwork')}>Artwork SVG</button><button onClick={()=>onExportMode('debug')}>Debug SVG</button><button onClick={onExportCSV}>CSV Drill Table</button></div><div className="section-title">Custom SVG options</div>{rows.map(([key,label])=><div key={key} style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}><input type="checkbox" checked={options[key] as boolean} onChange={e=>onChange({...options,[key]:e.target.checked})}/><span style={{fontSize:12,color:'#ccc'}}>{label}</span></div>)}<div style={{display:'flex',gap:8,justifyContent:'flex-end',marginTop:16}}><button onClick={onCancel}>Cancel</button><button className="primary" onClick={onExport}>Export SVG</button></div></div></div>;
}

// TOOLBAR
// ═══════════════════════════════════════════════════════════════════════════

function Toolbar({ onImport, onExportSVGClick, leftPanelOpen, rightPanelOpen, onToggleLeftPanel, onToggleRightPanel, touchMode, onToggleTouchMode, onFitView, onResetView }: {
  onImport: (e: React.ChangeEvent<HTMLInputElement>) => void;
  onExportSVGClick: () => void;
  leftPanelOpen: boolean;
  rightPanelOpen: boolean;
  onToggleLeftPanel: () => void;
  onToggleRightPanel: () => void;
  touchMode: 'edit' | 'pan';
  onToggleTouchMode: () => void;
  onFitView: () => void;
  onResetView: () => void;
}) {
  const state    = useAppState();
  const dispatch = useAppDispatch();

  function loadPreset(key: string) {
    const comps: PlacedComponent[] = PRESETS[key].map(c => ({ ...c, id: crypto.randomUUID() }));
    dispatch({ type: 'LOAD_PRESET', components: comps });
  }

  return (
    <div className="toolbar">
      <span style={{ fontWeight: 700, letterSpacing: '0.05em', color: '#aaa', fontSize: 12 }}>
        PANEL DESIGNER
      </span>
      <button
        className={`panel-toggle ${leftPanelOpen ? 'active' : ''}`}
        title="Show/hide left panel"
        onClick={onToggleLeftPanel}>
        ☰ Left
      </button>
      <button
        className={`panel-toggle ${rightPanelOpen ? 'active' : ''}`}
        title="Show/hide right panel"
        onClick={onToggleRightPanel}>
        Right ☰
      </button>
      <div className="tb-sep" />
      <button className={touchMode === 'pan' ? 'active' : ''} onClick={onToggleTouchMode}>{touchMode === 'pan' ? '✋ Pan' : '✏️ Edit'}</button>
      <button onClick={onFitView}>Fit</button><button onClick={onResetView}>Reset View</button>
      <div className="tb-sep" />

      <span className="tb-label">View:</span>
      {(['front','rear','drill','combined'] as ViewMode[]).map(m => (
        <button key={m}
          className={state.viewMode === m ? 'active' : ''}
          onClick={() => dispatch({ type: 'SET_VIEW_MODE', mode: m })}>
          {m.charAt(0).toUpperCase() + m.slice(1)}
        </button>
      ))}

      <div className="tb-sep" />

      <span className="tb-label">Grid:</span>
      <select className="tb-select"
        value={state.grid.size}
        onChange={e => dispatch({ type: 'SET_GRID_SIZE', size: +e.target.value as GridSize })}>
        <option value={0.5}>0.5mm</option>
        <option value={1}>1mm</option>
        <option value={2.5}>2.5mm</option>
        <option value={5}>5mm</option>
      </select>
      <button
        className={state.grid.showMajor ? 'active' : ''}
        onClick={() => dispatch({ type: 'TOGGLE_MAJOR_GRID' })}>
        5mm grid
      </button>

      <div className="tb-sep" />

      <span className="tb-label">Preset:</span>
      {Object.keys(PRESETS).map(k => (
        <button key={k} onClick={() => loadPreset(k)}>{k}</button>
      ))}

      <div className="tb-sep" />

      <button onClick={onExportSVGClick}>Export SVG</button>
      <button onClick={() => exportJSON(state)}>Save JSON</button>
      <button onClick={() => document.getElementById('json-import-input')!.click()}>Load JSON</button>
      <input
        id="json-import-input"
        type="file"
        accept=".json"
        style={{ display: 'none' }}
        onChange={onImport}
      />
      <button onClick={() => copyTable(state.components)}>Copy Table</button>

      <div className="tb-sep" />

      <button
        disabled={state.history.length === 0}
        onClick={() => dispatch({ type: 'UNDO' })}>
        ↩ Undo
      </button>
      <button
        disabled={state.future.length === 0}
        onClick={() => dispatch({ type: 'REDO' })}>
        ↪ Redo
      </button>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
// APP ROOT
// ═══════════════════════════════════════════════════════════════════════════

function App() {
  const state    = useAppState();
  const dispatch = useAppDispatch();
  const widthMM  = panelWidthMM(state.panel);

  // Zoom and pan (local UI state — not part of undo history)
  const [zoom, setZoom] = useState(1);
  const [pan,  setPan]  = useState({ x: 0, y: 0 });
  const [touchMode, setTouchMode] = useState<'edit' | 'pan'>('edit');
  const [touchPanning, setTouchPanning] = useState<{ startX: number; startY: number; panStart: { x: number; y: number } } | null>(null);
  const [autosaveStatus, setAutosaveStatus] = useState('');

  // Sidebar visibility — on phones the panels start closed and can slide over the canvas
  const isNarrowInitial = typeof window !== 'undefined' && window.innerWidth <= 860;
  const [leftPanelOpen,  setLeftPanelOpen]  = useState(!isNarrowInitial);
  const [rightPanelOpen, setRightPanelOpen] = useState(!isNarrowInitial);

  // Export dialog
  const [showExportDialog, setShowExportDialog] = useState(false);
  const [exportOptions,    setExportOptions]    = useState<ExportOptions>(DEFAULT_EXPORT_OPTIONS);

  // Drag: track which component is being dragged and the current preview position
  const [dragging, setDragging] = useState<{ id: string; offX: number; offY: number } | null>(null);
  const [dragPreview,        setDragPreview]        = useState<Map<string, { x: number; y: number }> | null>(null);
  const [dragStartPositions, setDragStartPositions] = useState<Map<string, { x: number; y: number }> | null>(null);
  // Refs mirror state so the window mouseup handler always sees latest values
  // regardless of React's flush/render cycle (avoids stale closure bug)
  const draggingRef    = useRef(dragging);
  const dragPreviewRef = useRef(dragPreview);
  draggingRef.current    = dragging;
  dragPreviewRef.current = dragPreview;
  const dragStartPositionsRef = useRef(dragStartPositions);
  dragStartPositionsRef.current = dragStartPositions;

  // Text drag state
  const [draggingText, setDraggingText] = useState<{ id: string; offX: number; offY: number } | null>(null);
  const [textDragPreview, setTextDragPreview] = useState<{ id: string; x: number; y: number } | null>(null);
  const draggingTextRef = useRef(draggingText);
  const textDragPreviewRef = useRef(textDragPreview);
  draggingTextRef.current = draggingText;
  textDragPreviewRef.current = textDragPreview;

  // Artwork drag state
  const [draggingArtwork, setDraggingArtwork] = useState<{ id: string; offX: number; offY: number } | null>(null);
  const [artworkDragPreview, setArtworkDragPreview] = useState<{ id: string; x: number; y: number } | null>(null);
  const draggingArtworkRef    = useRef(draggingArtwork);
  const artworkDragPreviewRef = useRef(artworkDragPreview);
  draggingArtworkRef.current    = draggingArtwork;
  artworkDragPreviewRef.current = artworkDragPreview;

  // Artwork resize state
  const [resizingArtwork, setResizingArtwork] = useState<{
    id: string;
    corner: 'tl' | 'tr' | 'bl' | 'br';
    startMM: { x: number; y: number };
    startW: number; startH: number;
    startArtX: number; startArtY: number;
  } | null>(null);
  const [artworkResizePreview, setArtworkResizePreview] = useState<{
    id: string; x: number; y: number; width: number; height: number;
  } | null>(null);
  const resizingArtworkRef      = useRef(resizingArtwork);
  const artworkResizePreviewRef = useRef(artworkResizePreview);
  resizingArtworkRef.current      = resizingArtwork;
  artworkResizePreviewRef.current = artworkResizePreview;

  // Pan: middle-mouse or Alt+drag
  const [panning, setPanning] = useState<{ startX: number; startY: number; panStart: { x: number; y: number } } | null>(null);

  // Mobile pinch zoom state. Two-finger pinch changes zoom; moving both fingers
  // together also pans the canvas slightly, matching common mobile editors.
  const [pinching, setPinching] = useState<{
    startDistance: number;
    startMid: { x: number; y: number };
    startZoom: number;
    startPan: { x: number; y: number };
  } | null>(null);

  // Hover coordinate readout
  const [coordReadout, setCoordReadout] = useState('');

  // Mobile/desktop component quick menu. On mobile, long-press a component;
  // on desktop, right-click a component. It avoids relying on keyboard shortcuts.
  const [componentMenu, setComponentMenu] = useState<{ id: string; x: number; y: number } | null>(null);
  const longPressTimerRef = useRef<number | null>(null);
  const longPressStartRef = useRef<{ id: string; x: number; y: number } | null>(null);

  const svgRef = useRef<SVGSVGElement>(null);

  // Collision warnings — recomputed on every state change
  const warnings = useMemo(
    () => computeWarnings(state.components, widthMM, state.mountingHoles, state.pcb),
    [state.components, widthMM, state.mountingHoles, state.pcb]
  );

  // ── Coordinate conversion ──────────────────────────────────────────────
  function clientToMM(clientX: number, clientY: number): { x: number; y: number } | null {
    const svg = svgRef.current;
    if (!svg) return null;
    const pt = svg.createSVGPoint();
    pt.x = clientX; pt.y = clientY;
    const ctm = svg.getScreenCTM();
    if (!ctm) return null;
    const mm = pt.matrixTransform(ctm.inverse());
    return { x: mm.x, y: mm.y };
  }

  function touchDistance(t1: React.Touch, t2: React.Touch): number {
    return Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY);
  }

  function touchMidpoint(t1: React.Touch, t2: React.Touch): { x: number; y: number } {
    return { x: (t1.clientX + t2.clientX) / 2, y: (t1.clientY + t2.clientY) / 2 };
  }

  function clampZoom(z: number): number {
    return Math.max(0.25, Math.min(6, z));
  }

  function clearComponentLongPress() {
    if (longPressTimerRef.current !== null) {
      window.clearTimeout(longPressTimerRef.current);
      longPressTimerRef.current = null;
    }
    longPressStartRef.current = null;
  }

  function scheduleComponentLongPress(target: EventTarget, clientX: number, clientY: number) {
    const el = target as Element;
    const group = el.closest('[data-id]') as SVGElement | null;
    if (!group) return;
    const id = group.getAttribute('data-id');
    if (!id) return;
    const comp = state.components.find(c => c.id === id);
    if (!comp) return;
    clearComponentLongPress();
    longPressStartRef.current = { id, x: clientX, y: clientY };
    longPressTimerRef.current = window.setTimeout(() => {
      dispatch({ type: 'SELECT', ids: [id], additive: false });
      setDragging(null);
      setDragPreview(null);
      setDragStartPositions(null);
      setDraggingArtwork(null);
      setArtworkDragPreview(null);
      setResizingArtwork(null);
      setArtworkResizePreview(null);
      setDraggingText(null);
      setTextDragPreview(null);
      setComponentMenu({ id, x: clientX, y: clientY });
      longPressTimerRef.current = null;
    }, 560);
  }

  function cancelLongPressIfMoved(clientX: number, clientY: number) {
    const start = longPressStartRef.current;
    if (!start) return;
    if (Math.hypot(clientX - start.x, clientY - start.y) > 10) {
      clearComponentLongPress();
    }
  }

  function duplicateComponentFromMenu(id: string) {
    dispatch({ type: 'DUPLICATE_COMPONENT', id });
    setComponentMenu(null);
    clearComponentLongPress();
  }

  function rotateComponentFromMenu(id: string) {
    const comp = state.components.find(c => c.id === id);
    if (!comp) return;
    dispatch({ type: 'UPDATE_COMPONENT', id, patch: { rotation: ((comp.rotation || 0) + 90) % 360 } });
    dispatch({ type: 'SELECT', ids: [id], additive: false });
    setComponentMenu(null);
    clearComponentLongPress();
  }

  function deleteComponentFromMenu(id: string) {
    dispatch({ type: 'DELETE_COMPONENT', id });
    setComponentMenu(null);
    clearComponentLongPress();
  }

  function onSVGContextMenu(e: React.MouseEvent<SVGSVGElement>) {
    const el = e.target as Element;
    const group = el.closest('[data-id]') as SVGElement | null;
    if (!group) return;
    e.preventDefault();
    e.stopPropagation();
    const id = group.getAttribute('data-id')!;
    dispatch({ type: 'SELECT', ids: [id], additive: false });
    setComponentMenu({ id, x: e.clientX, y: e.clientY });
  }

  // ── SVG mouse events ───────────────────────────────────────────────────
  function onSVGMouseDown(e: React.MouseEvent<SVGSVGElement>) {
    if (e.button !== 0) return;
    setComponentMenu(null);
    const mm = clientToMM(e.clientX, e.clientY);
    if (!mm) return;

    const el    = e.target as SVGElement;

    const textGroup = el.closest('[data-text-id]') as SVGElement | null;
    if (textGroup) { e.stopPropagation(); const id = textGroup.getAttribute('data-text-id')!; const t = state.textItems.find(tt => tt.id === id); if (t) { dispatch({ type:'SELECT_TEXT', id }); if (!t.locked) { setDraggingText({ id, offX: mm.x - t.x, offY: mm.y - t.y }); setTextDragPreview({ id, x:t.x, y:t.y }); } } return; }

    const resizeHandle = el.closest('[data-artwork-resize]') as SVGElement | null;
    if (resizeHandle) {
      e.stopPropagation();
      const [artId, corner] = resizeHandle.getAttribute('data-artwork-resize')!.split(':');
      const art = state.artworks.find(a => a.id === artId);
      if (art) {
        setResizingArtwork({
          id: artId,
          corner: corner as 'tl' | 'tr' | 'bl' | 'br',
          startMM: { x: mm.x, y: mm.y },
          startW: art.width, startH: art.height,
          startArtX: art.x,  startArtY: art.y,
        });
        setArtworkResizePreview({ id: artId, x: art.x, y: art.y, width: art.width, height: art.height });
      }
      return;
    }

    // Check for artwork click first (artworks sit above components in some layers)
    const artworkGroup = el.closest('[data-artwork-id]') as SVGElement | null;
    if (artworkGroup) {
      e.stopPropagation();
      const artId = artworkGroup.getAttribute('data-artwork-id')!;
      const art = state.artworks.find(a => a.id === artId);
      if (art) {
        if (art.locked && state.ignoreLockedArtworkClicks) {
          // Safety net: pointerEvents:none on the <g> prevents this branch from
          // being reached under normal conditions — CSS is the operative guard.
          // This handles any edge case where pointer-events doesn't apply.
        } else {
          dispatch({ type: 'SELECT_ARTWORK', id: artId });
          if (!art.locked) {
            setDraggingArtwork({ id: artId, offX: mm.x - art.x, offY: mm.y - art.y });
            setArtworkDragPreview({ id: artId, x: art.x, y: art.y });
          }
          return;
        }
      } else {
        return;
      }
    }

    const group = el.closest('[data-id]') as SVGElement | null;

    if (group) {
      e.stopPropagation(); // prevent canvas pan from triggering
      const id   = group.getAttribute('data-id')!;
      const comp = state.components.find(c => c.id === id)!;

      if (e.shiftKey) {
        dispatch({ type: 'SELECT', ids: [id], additive: true });
      } else if (!state.selected.includes(id)) {
        dispatch({ type: 'SELECT', ids: [id], additive: false });
      }

      setDragging({ id, offX: mm.x - comp.x, offY: mm.y - comp.y });

      const newSelected = e.shiftKey
        ? [...new Set([...state.selected, id])]
        : state.selected.includes(id)
          ? state.selected
          : [id];

      const startPositions = new Map(
        state.components
          .filter(c => newSelected.includes(c.id))
          .map(c => [c.id, { x: c.x, y: c.y }])
      );
      setDragStartPositions(startPositions);

      const initPreview = new Map<string, { x: number; y: number }>();
      startPositions.forEach((pos, cid) => initPreview.set(cid, { x: pos.x, y: pos.y }));
      setDragPreview(initPreview);
    } else {
      dispatch({ type: 'DESELECT_ALL' });
    }
  }

  function onSVGMouseMove(e: React.MouseEvent<SVGSVGElement>) {
    const mm = clientToMM(e.clientX, e.clientY);
    if (!mm) return;

    // Update coordinate readout
    setCoordReadout(`x: ${mm.x.toFixed(1)} mm   y: ${mm.y.toFixed(1)} mm`);

    // Update drag preview (does NOT dispatch to reducer — avoids undo stack pollution)
    if (dragging && dragStartPositions) {
      const primaryOrig = dragStartPositions.get(dragging.id)!;
      const snappedX = snapToGrid(mm.x - dragging.offX, state.grid.size);
      const snappedY = snapToGrid(mm.y - dragging.offY, state.grid.size);
      const dx = snappedX - primaryOrig.x;
      const dy = snappedY - primaryOrig.y;
      const newPreview = new Map<string, { x: number; y: number }>();
      dragStartPositions.forEach((origPos, cid) => {
        newPreview.set(cid, { x: origPos.x + dx, y: origPos.y + dy });
      });
      setDragPreview(newPreview);
    }

    if (draggingText) { const snappedX = snapToGrid(mm.x - draggingText.offX, state.grid.size); const snappedY = snapToGrid(mm.y - draggingText.offY, state.grid.size); setTextDragPreview({ id: draggingText.id, x: snappedX, y: snappedY }); }

    if (draggingArtwork) {
      const snappedX = snapToGrid(mm.x - draggingArtwork.offX, state.grid.size);
      const snappedY = snapToGrid(mm.y - draggingArtwork.offY, state.grid.size);
      setArtworkDragPreview({ id: draggingArtwork.id, x: snappedX, y: snappedY });
    }

    if (resizingArtwork) {
      const { id, corner, startMM, startW, startH, startArtX, startArtY } = resizingArtwork;
      const art = state.artworks.find(a => a.id === id);
      if (!art) return;
      const dx = mm.x - startMM.x;
      const dy = mm.y - startMM.y;

      let newW = startW;
      let newH = startH;
      let newX = startArtX;
      let newY = startArtY;
      const MIN = 1;

      if (corner === 'br') {
        // tl is fixed — center shifts right and down as br expands
        newW = Math.max(MIN, snapToGrid(startW + dx, state.grid.size));
        newH = art.preserveAspectRatio ? newW * (startH / startW) : Math.max(MIN, snapToGrid(startH + dy, state.grid.size));
        newX = startArtX + (newW - startW) / 2;
        newY = startArtY + (newH - startH) / 2;
      } else if (corner === 'bl') {
        // tr is fixed — center shifts left as bl expands in X, down as height grows
        newW = Math.max(MIN, snapToGrid(startW - dx, state.grid.size));
        newH = art.preserveAspectRatio ? newW * (startH / startW) : Math.max(MIN, snapToGrid(startH + dy, state.grid.size));
        newX = startArtX + (startW - newW) / 2;
        newY = startArtY + (newH - startH) / 2;
      } else if (corner === 'tr') {
        // bl is fixed — center shifts right as tr expands in X, up as height shrinks
        newW = Math.max(MIN, snapToGrid(startW + dx, state.grid.size));
        newH = art.preserveAspectRatio ? newW * (startH / startW) : Math.max(MIN, snapToGrid(startH - dy, state.grid.size));
        newX = startArtX + (newW - startW) / 2;
        newY = startArtY + (startH - newH) / 2;
      } else {
        // br is fixed (tl corner) — center shifts left and up
        newW = Math.max(MIN, snapToGrid(startW - dx, state.grid.size));
        newH = art.preserveAspectRatio ? newW * (startH / startW) : Math.max(MIN, snapToGrid(startH - dy, state.grid.size));
        newX = startArtX + (startW - newW) / 2;
        newY = startArtY + (startH - newH) / 2;
      }

      setArtworkResizePreview({ id, x: newX, y: newY, width: newW, height: newH });
    }
  }

  function onSVGMouseUp(_e: React.MouseEvent<SVGSVGElement>) {
    // Global window handler below commits the move and clears state
  }

  function onSVGTouchStart(e: React.TouchEvent<SVGSVGElement>) {
    // Two-finger pinch zoom on mobile. If a second finger is placed while an
    // object is being dragged, cancel the preview drag and switch to pinch mode.
    if (e.touches.length === 2) {
      clearComponentLongPress();
      e.preventDefault();
      const t1 = e.touches[0];
      const t2 = e.touches[1];
      setDragging(null);
      setDragPreview(null);
      setDragStartPositions(null);
      setDraggingArtwork(null);
      setArtworkDragPreview(null);
      setResizingArtwork(null);
      setArtworkResizePreview(null);
      setPinching({
        startDistance: Math.max(1, touchDistance(t1, t2)),
        startMid: touchMidpoint(t1, t2),
        startZoom: zoom,
        startPan: pan,
      });
      return;
    }

    if (e.touches.length !== 1) return;
    if (pinching) return;
    const t = e.touches[0];
    if (touchMode === 'pan') { e.preventDefault(); setTouchPanning({ startX: t.clientX, startY: t.clientY, panStart: pan }); return; }
    scheduleComponentLongPress(e.target, t.clientX, t.clientY);
    // Touch input should behave like left mouse drag on the canvas.
    // Prevent browser scroll while the user is moving parts/artwork.
    e.preventDefault();
    onSVGMouseDown({
      button: 0,
      clientX: t.clientX,
      clientY: t.clientY,
      target: e.target,
      shiftKey: false,
      stopPropagation: () => {},
    } as unknown as React.MouseEvent<SVGSVGElement>);
  }

  function onSVGTouchMove(e: React.TouchEvent<SVGSVGElement>) {
    if (e.touches.length === 2) {
      clearComponentLongPress();
      e.preventDefault();
      const t1 = e.touches[0];
      const t2 = e.touches[1];
      const mid = touchMidpoint(t1, t2);
      const dist = Math.max(1, touchDistance(t1, t2));
      const p = pinching ?? {
        startDistance: dist,
        startMid: mid,
        startZoom: zoom,
        startPan: pan,
      };
      if (!pinching) setPinching(p);
      const nextZoom = clampZoom(p.startZoom * (dist / p.startDistance));
      setZoom(nextZoom);
      setPan({
        x: p.startPan.x + (mid.x - p.startMid.x),
        y: p.startPan.y + (mid.y - p.startMid.y),
      });
      return;
    }

    if (e.touches.length !== 1) return;
    if (pinching) return;
    const t = e.touches[0];
    cancelLongPressIfMoved(t.clientX, t.clientY);
    e.preventDefault();
    if (touchPanning) { setPan({ x: touchPanning.panStart.x + t.clientX - touchPanning.startX, y: touchPanning.panStart.y + t.clientY - touchPanning.startY }); return; }
    onSVGMouseMove({
      clientX: t.clientX,
      clientY: t.clientY,
    } as unknown as React.MouseEvent<SVGSVGElement>);
  }

  function onSVGTouchEnd(e: React.TouchEvent<SVGSVGElement>) {
    clearComponentLongPress();
    e.preventDefault();
    if (pinching) {
      if (e.touches.length < 2) setPinching(null);
      return;
    }
    if (touchPanning) { setTouchPanning(null); return; }
    // Let the same global commit path finish component/artwork drag and resize.
    window.dispatchEvent(new MouseEvent('mouseup'));
  }

  // ── Canvas pan (Alt+drag or middle-mouse on wrapper div) ───────────────
  function onWrapMouseDown(e: React.MouseEvent<HTMLDivElement>) {
    if (e.button === 1 || (e.button === 0 && e.altKey)) {
      e.preventDefault();
      setPanning({ startX: e.clientX, startY: e.clientY, panStart: pan });
    }
  }

  useEffect(() => {
    function onMouseMove(e: MouseEvent) {
      if (!panning) return;
      setPan({
        x: panning.panStart.x + e.clientX - panning.startX,
        y: panning.panStart.y + e.clientY - panning.startY,
      });
    }
    function onMouseUp() { setPanning(null); }
    window.addEventListener('mousemove', onMouseMove);
    window.addEventListener('mouseup',   onMouseUp);
    return () => {
      window.removeEventListener('mousemove', onMouseMove);
      window.removeEventListener('mouseup',   onMouseUp);
    };
  }, [panning]);

  // ── Global drag cleanup — commits move even if mouseup happens outside SVG ──
  // Reads from refs (not closure) so it always sees the latest position even if
  // React has flushed a render between the SVG mouseup and window mouseup.
  useEffect(() => {
    function onGlobalMouseUp() {
      if (draggingRef.current) {
        if (dragPreviewRef.current && dragPreviewRef.current.size > 0) {
          const moves: { id: string; x: number; y: number }[] = [];
          dragPreviewRef.current.forEach((pos, id) => moves.push({ id, x: pos.x, y: pos.y }));
          if (moves.length === 1) {
            dispatch({ type: 'MOVE_COMPONENT', id: moves[0].id, x: moves[0].x, y: moves[0].y });
          } else {
            dispatch({ type: 'MOVE_COMPONENTS', moves });
          }
        }
        setDragging(null);
        setDragPreview(null);
        setDragStartPositions(null);
      }

      if (draggingTextRef.current) { if (textDragPreviewRef.current) { const { id } = draggingTextRef.current; const { x, y } = textDragPreviewRef.current; dispatch({ type: 'MOVE_TEXT', id, x, y }); } setDraggingText(null); setTextDragPreview(null); }

      if (draggingArtworkRef.current) {
        if (artworkDragPreviewRef.current) {
          const { id } = draggingArtworkRef.current;
          const { x, y } = artworkDragPreviewRef.current;
          dispatch({ type: 'MOVE_ARTWORK', id, x, y });
        }
        setDraggingArtwork(null);
        setArtworkDragPreview(null);
      }

      if (resizingArtworkRef.current && artworkResizePreviewRef.current) {
        const { id } = resizingArtworkRef.current;
        const { x, y, width, height } = artworkResizePreviewRef.current;
        dispatch({ type: 'UPDATE_ARTWORK', id, patch: { x, y, width, height } });
      }
      setResizingArtwork(null);
      setArtworkResizePreview(null);
    }
    window.addEventListener('mouseup', onGlobalMouseUp);
    return () => window.removeEventListener('mouseup', onGlobalMouseUp);
  }, [dispatch]);

  // ── Zoom ───────────────────────────────────────────────────────────────
  function onWheel(e: React.WheelEvent<HTMLDivElement>) {
    e.preventDefault();
    setZoom(z => clampZoom(z * (e.deltaY < 0 ? 1.1 : 0.9)));
  }

  // ── Keyboard shortcuts ─────────────────────────────────────────────────
  useEffect(() => {
    function onKey(e: KeyboardEvent) {
      const tag = (e.target as HTMLElement).tagName;
      if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;

      if (e.key === 'Delete' || e.key === 'Backspace') {
        if (state.selectedText) {
          dispatch({ type: 'DELETE_TEXT', id: state.selectedText });
        } else if (state.selectedArtwork) {
          dispatch({ type: 'DELETE_ARTWORK', id: state.selectedArtwork });
        } else {
          dispatch({ type: 'DELETE_SELECTED' });
        }
      } else if (e.key === 'd' || e.key === 'D') {
        dispatch({ type: 'DUPLICATE_SELECTED' });
      } else if (e.key === 'Escape') {
        dispatch({ type: 'DESELECT_ALL' });
      } else if ((e.ctrlKey || e.metaKey) && !e.shiftKey && e.key.toLowerCase() === 'z') {
        e.preventDefault();
        dispatch({ type: 'UNDO' });
      } else if ((e.ctrlKey || e.metaKey) && (e.key === 'y' || (e.shiftKey && e.key.toLowerCase() === 'z'))) {
        e.preventDefault();
        dispatch({ type: 'REDO' });
      } else if ((e.ctrlKey || e.metaKey) && e.key === 'a') {
        e.preventDefault();
        dispatch({ type: 'SELECT', ids: state.components.map(c => c.id), additive: false });
      } else if ((e.ctrlKey || e.metaKey) && e.key === 's') {
        e.preventDefault();
        exportJSON(state);
      } else if ((e.ctrlKey || e.metaKey) && e.key === 'e') {
        e.preventDefault();
        setShowExportDialog(true);
      } else if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.key)) {
        if (state.selected.length === 0 && !state.selectedArtwork && !state.selectedText) return;
        e.preventDefault();
        const d  = e.shiftKey ? 0.1 : state.grid.size;
        const dx = e.key === 'ArrowLeft' ? -d : e.key === 'ArrowRight' ? d : 0;
        const dy = e.key === 'ArrowUp'   ? -d : e.key === 'ArrowDown'  ? d : 0;
        if (state.selectedText) { const t = state.textItems.find(tt => tt.id === state.selectedText); if (t) dispatch({ type:'MOVE_TEXT', id:t.id, x:t.x+dx, y:t.y+dy }); } else if (state.selectedArtwork) { const a = state.artworks.find(aa => aa.id === state.selectedArtwork); if (a && !a.locked) dispatch({ type:'MOVE_ARTWORK', id:a.id, x:a.x+dx, y:a.y+dy }); } else { state.selected.forEach(id => { const c = state.components.find(cc => cc.id === id); if (c) dispatch({ type: 'MOVE_COMPONENT', id, x: c.x + dx, y: c.y + dy }); }); }
      }
    }
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [state, dispatch]);

  // ── Autosave ───────────────────────────────────────────────────────────
  function projectString(st: AppState): string { const { history: _h, future: _f, ...clean } = st; return JSON.stringify({ projectVersion: 3, ...clean }); }
  useEffect(() => { const t = window.setTimeout(() => { try { const data = projectString(state); localStorage.setItem('eurorack-panel-autosave-v3', data); setAutosaveStatus(`Autosaved ${new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })} · ${(data.length/1024).toFixed(0)} KB`); } catch { setAutosaveStatus('Autosave failed'); } }, 5000); return () => window.clearTimeout(t); }, [state]);
  function restoreAutosave() { const data = localStorage.getItem('eurorack-panel-autosave-v3'); if (!data) return alert('No autosave found.'); let raw: unknown; try { raw = JSON.parse(data); } catch { return alert('Autosave is corrupted.'); } const result = validateAndNormalize(raw); if (!result.ok) return alert(`Autosave import failed: ${result.error}`); if (!confirm('Restore autosave and replace current layout?')) return; dispatch({ type:'LOAD_STATE', state: result.state }); }
  function clearAutosave() { localStorage.removeItem('eurorack-panel-autosave-v3'); setAutosaveStatus('Autosave cleared'); }

  // ── JSON Import ────────────────────────────────────────────────────────
  function onImport(e: React.ChangeEvent<HTMLInputElement>) {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      let raw: unknown;
      try {
        raw = JSON.parse(ev.target!.result as string);
      } catch {
        alert('Could not parse file: invalid JSON syntax.');
        return;
      }
      const result = validateAndNormalize(raw);
      if (!result.ok) {
        alert(`Import failed: ${result.error}`);
        return;
      }
      if (state.components.length > 0 &&
          !confirm('Replace current layout with loaded file?')) return;
      if (result.repairs.length > 0) {
        alert(`Imported with repairs:\n• ${result.repairs.join('\n• ')}`);
      }
      dispatch({ type: 'LOAD_STATE', state: result.state });
    };
    reader.readAsText(file);
    e.target.value = '';
  }

  // ── Render ─────────────────────────────────────────────────────────────
  return (
    <div className="app">
      <Toolbar
        onImport={onImport}
        onExportSVGClick={() => setShowExportDialog(true)}
        leftPanelOpen={leftPanelOpen}
        rightPanelOpen={rightPanelOpen}
        onToggleLeftPanel={() => setLeftPanelOpen(v => !v)}
        onToggleRightPanel={() => setRightPanelOpen(v => !v)}
        touchMode={touchMode}
        onToggleTouchMode={() => setTouchMode(m => m === 'edit' ? 'pan' : 'edit')}
        onFitView={() => { setZoom(1.25); setPan({ x: 0, y: 0 }); }}
        onResetView={() => { setZoom(1); setPan({ x: 0, y: 0 }); }}
      />
      {showExportDialog && (
        <ExportDialog
          options={exportOptions}
          onChange={setExportOptions}
          onExport={() => { exportSVG(state, exportOptions); setShowExportDialog(false); }}
          onExportMode={(mode) => { exportSVGMode(state, mode, warnings); setShowExportDialog(false); }}
          onExportCSV={() => { exportCSVDrillTable(state, warnings); setShowExportDialog(false); }}
          onCancel={() => setShowExportDialog(false)}
        />
      )}
      <div className="workspace">
        <div
          className={`mobile-sidebar-backdrop ${(leftPanelOpen || rightPanelOpen) ? 'visible' : ''}`}
          onClick={() => { setLeftPanelOpen(false); setRightPanelOpen(false); }}
        />
        <LeftSidebar open={leftPanelOpen} />
        <SVGCanvas
          svgRef={svgRef}
          zoom={zoom}
          pan={pan}
          dragPreview={dragPreview}
          artworkDragPreview={artworkDragPreview}
          artworkResizePreview={artworkResizePreview}
          textDragPreview={textDragPreview}
          onSVGMouseMove={onSVGMouseMove}
          onSVGMouseDown={onSVGMouseDown}
          onSVGMouseUp={onSVGMouseUp}
          onSVGTouchStart={onSVGTouchStart}
          onSVGTouchMove={onSVGTouchMove}
          onSVGTouchEnd={onSVGTouchEnd}
          onSVGContextMenu={onSVGContextMenu}
          onWheel={onWheel}
          onWrapMouseDown={onWrapMouseDown}
          coordReadout={coordReadout}
          warnings={warnings}
        />
        {componentMenu && (() => {
          const comp = state.components.find(c => c.id === componentMenu.id);
          if (!comp) return null;
          const left = Math.min(Math.max(8, componentMenu.x), window.innerWidth - 190);
          const top  = Math.min(Math.max(52, componentMenu.y), window.innerHeight - 160);
          return (
            <div
              style={{
                position: 'fixed',
                left,
                top,
                zIndex: 1200,
                background: '#181818',
                border: '1px solid #00d4ff',
                borderRadius: 6,
                boxShadow: '0 10px 30px rgba(0,0,0,0.55)',
                padding: 8,
                minWidth: 170,
                touchAction: 'manipulation',
              }}
              onMouseDown={e => e.stopPropagation()}
              onTouchStart={e => e.stopPropagation()}
            >
              <div style={{ fontSize: 11, color: '#00d4ff', marginBottom: 6, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>
                {comp.label || comp.name}
              </div>
              <div className="btn-row" style={{ flexDirection: 'column' }}>
                <button onClick={() => duplicateComponentFromMenu(comp.id)}>Duplicate</button>
                <button onClick={() => rotateComponentFromMenu(comp.id)}>Rotate +90°</button>
                <button className="danger" onClick={() => deleteComponentFromMenu(comp.id)}>Delete</button>
                <button onClick={() => setComponentMenu(null)}>Close</button>
              </div>
            </div>
          );
        })()}
        <RightSidebar warnings={warnings} components={state.components} open={rightPanelOpen} autosaveStatus={autosaveStatus} onRestoreAutosave={restoreAutosave} onClearAutosave={clearAutosave} />
      </div>
      <div className="footer-bar">
        ⚠ Dimensions are planning estimates. Verify all parts with datasheets/calipers before manufacturing.
        &nbsp;|&nbsp; Drag with one finger · Long-press component for Duplicate/Rotate/Delete · Pinch with two fingers to zoom &nbsp;|&nbsp; Alt+drag or middle-mouse to pan &nbsp;|&nbsp; Scroll to zoom
        &nbsp;|&nbsp; Top toolbar scrolls horizontally &nbsp;|&nbsp; ☰ Left / Right ☰ hide side panels on mobile
        &nbsp;|&nbsp; Del=delete &nbsp;D=duplicate &nbsp;Ctrl+Z/Y=undo/redo &nbsp;Ctrl+A=select all
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')!).render(
  <AppProvider><App /></AppProvider>
);
  </script>
</body>
</html>
