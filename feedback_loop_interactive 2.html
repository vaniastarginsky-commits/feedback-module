<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feedback Loop — Signal Flow</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #0e0e1a;
  padding: 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  font-family: Arial, sans-serif;
  min-height: 100vh;
  min-height: 100dvh;
}

/* ── Controls ── */
.controls {
  display: flex;
  gap: 10px;
  margin-bottom: 8px;
  flex-wrap: wrap;
  justify-content: center;
}
.sw-btn {
  padding: 11px 22px;
  border-radius: 9px;
  border: 2px solid;
  cursor: pointer;
  font-size: 13px;
  font-weight: bold;
  transition: all 0.15s;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  min-width: 160px;
}
.sw-btn.sw1 { border-color: #1E8840; }
.sw-btn.sw1.is-loop { background: #1E8840; color: #fff; }
.sw-btn.sw1.is-main { background: #060f08; color: #1E8840; }
.sw-btn.sw2 { border-color: #6E24A0; }
.sw-btn.sw2.is-loop { background: #6E24A0; color: #fff; }
.sw-btn.sw2.is-main { background: #0a0416; color: #9B5DD4; }

.info-btn {
  padding: 11px 22px;
  border-radius: 9px;
  border: 2px solid #2a4a6a;
  cursor: pointer;
  font-size: 13px;
  font-weight: bold;
  transition: all 0.15s;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  min-width: 160px;
  background: #0a1520;
  color: #5a9abb;
}
.info-btn:hover { background: #0f1e2e; color: #7abcdd; border-color: #3a6a8a; }
.info-btn.active { background: #112436; color: #88ccee; border-color: #5590b8; }

.combo {
  color: #888;
  font-size: 12px;
  margin-bottom: 12px;
  min-height: 16px;
  text-align: center;
  padding: 0 8px;
}
.combo b { color: #ddd; }

/* ── Layout ── */
.layout {
  display: flex;
  gap: 18px;
  align-items: flex-start;
  width: 100%;
  max-width: 1180px;
}

/* ── SVG container ── */
.svg-wrap {
  flex-shrink: 0;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  width: 100%;
  max-width: 820px;
  scrollbar-width: thin;
  scrollbar-color: #333 transparent;
}
.svg-wrap::-webkit-scrollbar { height: 4px; }
.svg-wrap::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

.svg-wrap svg {
  display: block;
  min-width: 820px;
}

/* ── Desktop panel ── */
.panel {
  width: 310px;
  min-height: 260px;
  background: #161626;
  border: 1px solid #252545;
  border-radius: 12px;
  padding: 18px 16px;
  color: #bbb;
  font-size: 12px;
  line-height: 1.65;
  flex-shrink: 0;
  max-height: calc(100vh - 100px);
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: #2a2a44 transparent;
}
.panel::-webkit-scrollbar { width: 4px; }
.panel::-webkit-scrollbar-thumb { background: #2a2a44; border-radius: 2px; }

/* ── Shared panel content styles ── */
.panel-content h3, .sheet-content h3 {
  color: #fff;
  font-size: 15px;
  margin-bottom: 10px;
  padding-bottom: 8px;
  border-bottom: 1px solid #2a2a4a;
}
.panel-content h4, .sheet-content h4 {
  color: #aad;
  font-size: 12px;
  margin: 10px 0 4px;
}
.panel-content .tag, .sheet-content .tag {
  display: inline-block;
  font-size: 9px;
  font-weight: bold;
  padding: 2px 8px;
  border-radius: 4px;
  margin-bottom: 10px;
  letter-spacing: 0.5px;
}
.panel-content ul, .sheet-content ul {
  padding-left: 14px;
  margin-top: 5px;
}
.panel-content ul li, .sheet-content ul li { margin-bottom: 3px; }
.panel-content .chip, .sheet-content .chip {
  background: #1e1e36;
  border: 1px solid #333;
  border-radius: 6px;
  padding: 6px 9px;
  margin-top: 8px;
  font-size: 11px;
  color: #9ad;
}
.panel-content .hint, .sheet-content .hint {
  color: #444;
  font-style: italic;
  text-align: center;
  margin-top: 40px;
  line-height: 1.8;
}

/* ── Project info specific styles ── */
.erc-steps {
  display: flex;
  align-items: center;
  gap: 6px;
  margin: 8px 0 10px;
}
.erc-step {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}
.erc-step .n { font-size: 16px; font-weight: bold; line-height: 1; }
.erc-step .l { font-size: 9px; color: #666; letter-spacing: 0.3px; }
.erc-step.baseline .n { color: #cc4444; }
.erc-step.s2 .n { color: #cc8833; }
.erc-step.current .n { color: #44cc88; }
.erc-step .delta { font-size: 9px; color: #44aa66; background: #0d2a1a; border: 1px solid #1a4a2a; border-radius: 3px; padding: 1px 4px; }
.erc-arr { color: #333; font-size: 13px; }

.erc-bar-track {
  height: 6px;
  background: #1a1a2e;
  border-radius: 3px;
  overflow: hidden;
  margin-bottom: 5px;
}
.erc-bar-fill {
  height: 100%;
  border-radius: 3px;
  background: linear-gradient(90deg, #44cc88, #338855);
}
.erc-bar-sub {
  font-size: 9px;
  color: #444;
  text-align: right;
}
.erc-breakdown {
  margin-top: 8px;
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.erc-row {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 10px;
}
.erc-row .cat { color: #668; flex: 1; font-family: monospace; font-size: 9.5px; }
.erc-row .cnt { color: #bbb; font-weight: bold; min-width: 28px; text-align: right; }
.erc-row .bar { flex: 2; height: 4px; background: #1a1a2e; border-radius: 2px; overflow: hidden; }
.erc-row .bar-fill { height: 100%; border-radius: 2px; }
.erc-row.warn .cat { color: #555; }
.erc-row.warn .cnt { color: #666; }
.erc-row.cleared .cat { color: #336633; }
.erc-row.cleared .cnt { color: #44aa44; }

.ic-table { width: 100%; border-collapse: collapse; margin-top: 6px; }
.ic-table td { padding: 3px 4px; font-size: 10px; border-bottom: 1px solid #1c1c30; }
.ic-table td:first-child { color: #88ccee; font-family: monospace; font-weight: bold; width: 80px; }
.ic-table td:last-child { color: #889; font-size: 9px; }
.ic-table td:nth-child(2) { color: #aaa; }
.ic-table .qty { color: #778; font-size: 9px; }

.status-list { margin-top: 6px; }
.status-row {
  display: flex;
  align-items: baseline;
  gap: 6px;
  font-size: 10.5px;
  padding: 3px 0;
  border-bottom: 1px solid #16162a;
}
.status-icon { font-size: 10px; min-width: 14px; }
.status-name { color: #aab; flex: 1; }
.status-name.pending { color: #777; }
.status-badge {
  font-size: 8px;
  font-weight: bold;
  padding: 1px 5px;
  border-radius: 3px;
  letter-spacing: 0.3px;
}
.done-badge { background: #0d2a1a; color: #44aa66; border: 1px solid #1a5a2a; }
.wip-badge { background: #2a1a08; color: #cc8833; border: 1px solid #5a3a10; }
.todo-badge { background: #1a1a2e; color: #556; border: 1px solid #252545; }

.spec-row { display: flex; gap: 6px; font-size: 10px; padding: 2px 0; }
.spec-key { color: #556; min-width: 60px; }
.spec-val { color: #99bbcc; }

/* ── Clickable SVG blocks ── */
.blk { cursor: pointer; -webkit-tap-highlight-color: transparent; }
.blk:hover { filter: brightness(1.35) drop-shadow(0 0 6px rgba(255,255,255,0.22)); }
.blk.sel  { filter: brightness(1.5)  drop-shadow(0 0 10px rgba(255,255,255,0.38)); }

/* ── Mobile: bottom sheet overlay ── */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.55);
  z-index: 90;
  opacity: 0;
  transition: opacity 0.25s;
}
.overlay.show { opacity: 1; }

.bottom-sheet {
  display: none;
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: #161626;
  border-top: 1px solid #2a2a48;
  border-radius: 18px 18px 0 0;
  padding: 14px 18px 24px;
  z-index: 100;
  max-height: 72dvh;
  overflow-y: auto;
  transform: translateY(100%);
  transition: transform 0.28s cubic-bezier(0.32, 0.72, 0, 1);
  -webkit-overflow-scrolling: touch;
  color: #bbb;
  font-size: 13px;
  line-height: 1.65;
}
.bottom-sheet.open { transform: translateY(0); }

.sheet-handle {
  width: 40px;
  height: 4px;
  background: #38385a;
  border-radius: 2px;
  margin: 0 auto 14px;
}

/* ── Scroll hint ── */
.scroll-hint {
  display: none;
  color: #444;
  font-size: 11px;
  text-align: center;
  margin-bottom: 6px;
  letter-spacing: 0.5px;
}

/* ── Responsive ── */
@media (max-width: 900px) {
  body { padding: 12px; }
  .layout { flex-direction: column; gap: 0; }
  .panel { display: none; }
  .bottom-sheet { display: block; }
  .overlay { display: block; }
  .scroll-hint { display: block; }
  .svg-wrap { max-width: 100%; }
}

@media (max-width: 480px) {
  .sw-btn, .info-btn { min-width: 140px; font-size: 12px; padding: 10px 14px; }
}
</style>
</head>

const combos = {
  'LL': '<b>Both in LOOP</b> — SSI2144 + Clipper shape feedback each cycle. Max chaos.',
  'MM': '<b>Both in MAIN</b> — Standalone FX. Clean feedback: only S/R + HP/LP + Phase.',
  'ML': '<b>SPLIT</b> — Clipper colors input. SSI2144 shapes loop resonance.',
  'LM': '<b>REVERSED SPLIT</b> — Drive builds in loop. SSI2144 colors final output.',
};

// ── Helpers ──
function $  (id) { return document.getElementById(id); }
function att(id, k, v) { $(id).setAttribute(k, v); }
function showEl(id) { att(id, 'display', ''); }
function hideEl(id) { att(id, 'display', 'none'); }
function opac(id, v) { att(id, 'opacity', v); }

function isMobile() { return window.innerWidth < 900; }

// ── Render description HTML ──
function renderDesc(key) {
  const d = desc[key];
  if (!d) return '';
  return `
    <h3>${d.title}</h3>
    <span class="tag" style="background:${d.tagColor}22;color:${d.tagColor};border:1px solid ${d.tagColor}44">${d.tag}</span>
    ${d.body}
  `;
}

// ── Show description ──
function show(key) {
  if (activeBlock) document.getElementById('b-' + activeBlock)?.classList.remove('sel');

  const svgId = {
    inputs:    'inputs',
    xfader:    'xfader',
    output:    'output',
    sendreturn:'sr',
    hp:        'hp',
    lp:        'lp',
    phase:     'phase',
    stability: 'stability',
    leds:      'leds',
    chunk1:    'ch1',
    chunk2:    'ch2',
    chunk3:    'ch3',
    session2:  'ses2',
    session3:  'ses3',
    project:   null,
    clipper:   s1 ? 'CL' : 'CM',
    ssi2144:   s2 ? 'SL' : 'SM',
  }[key];

  if (svgId) {
    document.getElementById('b-' + svgId)?.classList.add('sel');
    activeBlock = svgId;
  }

  // Info button state
  $('btnInfo').classList.toggle('active', key === 'project');

  const html = renderDesc(key);

  if (isMobile()) {
    $('sheet-content').innerHTML = html;
    $('sheet').classList.add('open');
    $('overlay').classList.add('show');
  } else {
    $('panel-desktop').innerHTML = `<div class="panel-content">${html}</div>`;
  }
}

function closeSheet() {
  $('sheet').classList.remove('open');
  $('overlay').classList.remove('show');
  if (activeBlock) document.getElementById('b-' + activeBlock)?.classList.remove('sel');
  activeBlock = null;
  $('btnInfo').classList.remove('active');
}

// ── Switches ──
function toggleSW(sw) {
  if (sw === 1) s1 = !s1; else s2 = !s2;
  update();
}

function update() {
  opac('b-CM', s1 ? 0.2 : 1.0);
  opac('b-CL', s1 ? 1.0 : 0.2);
  opac('b-SM', s2 ? 0.2 : 1.0);
  opac('b-SL', s2 ? 1.0 : 0.2);

  // Main path arrows
  if (!s1) {
    att('aXF','y2', 176); showEl('aCM');
    att('aCM','y2', s2 ? 240 : 310);
    if (!s2) showEl('aSM'); else hideEl('aSM');
  } else {
    hideEl('aCM');
    att('aXF','y2', s2 ? 240 : 310);
    if (!s2) showEl('aSM'); else hideEl('aSM');
  }

  // Right connector
  if (s1)      { showEl('cRC'); hideEl('cRS'); hideEl('cRSR'); }
  else if (s2) { hideEl('cRC'); showEl('cRS'); hideEl('cRSR'); }
  else         { hideEl('cRC'); hideEl('cRS'); showEl('cRSR'); }

  // Loop arrows
  if (s1 && s2)  { showEl('aCL_sl'); hideEl('aCL_sr'); showEl('aSL_sr'); }
  else if (s1)   { hideEl('aCL_sl'); showEl('aCL_sr'); hideEl('aSL_sr'); }
  else if (s2)   { hideEl('aCL_sl'); hideEl('aCL_sr'); showEl('aSL_sr'); }
  else           { hideEl('aCL_sl'); hideEl('aCL_sr'); hideEl('aSL_sr'); }

  $('lbl1').textContent = s1 ? 'LOOP' : 'MAIN';
  $('lbl2').textContent = s2 ? 'LOOP' : 'MAIN';
  $('btn1').className = 'sw-btn sw1 ' + (s1 ? 'is-loop' : 'is-main');
  $('btn2').className = 'sw-btn sw2 ' + (s2 ? 'is-loop' : 'is-main');
  $('combo').innerHTML = combos[(s1?'L':'M')+(s2?'L':'M')];

  closeSheet();
}

update();
</script>
